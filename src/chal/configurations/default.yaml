#     model: "deepseek-r1:14b"         # Local model — no API key required
#     temperature: 0.7
#     provider: "ollama"

# ============================================================================
# ADJUDICATION SETTINGS
# ============================================================================
# Controls how the neutral adjudicator evaluates challenge-rebuttal pairs
adjudication:
  # RECOMMENDED: Use "o4-mini" for superior logical reasoning at low cost
  # - o4-mini: Best for pure logic evaluation (faster, cheaper, excellent reasoning)
  # - o1: More thorough but slower and more expensive (use for high-stakes debates)
  # - gpt-4o: Adequate but less rigorous than reasoning models
  model: "o4-mini"                     # Model for the adjudicator
  provider: "openai"                   # LLM provider: "openai" | "anthropic" | "google" | "ollama" | "xai" | "perplexity"

  # Weighting for evaluation criteria (should sum to 1.0)
  logic_weight: 1.0                    # Weight for logical rigor (0.0-1.0)
  ethics_weight: 0.0                   # Weight for ethical considerations (0.0-1.0)

  # Framework keys (see logic_systems.py and ethics_systems.py for options)
  logic_system: "CLASSICAL_INFORMAL_BAYESIAN"
  ethics_system: "NONE"

# ============================================================================
# STAGE PARAMETERS
# ============================================================================
# Fine-tune the behavior of each debate stage
stages:
  # Stage 2: Cross-Examination
  max_questions_per_cross_exam: 5      # Max questions each agent asks per opponent

  # Stage 3: Rebuttals
  max_rebuttals_per_response: 5        # Max rebuttals per agent per round
  max_rebuttal_length_chars: 1000       # Character limit per rebuttal

  # Generation settings for structured outputs
  generation_temperature: 0.2          # Low temperature for precise JSON (0.0-1.0)

  # Text length limits
  short_note_max_chars: 140            # Twitter-style short notes (conclusions, adjudication)

# ============================================================================
# PERFORMANCE SCORING
# ============================================================================
# Weighted scoring system to evaluate agent performance during debate
performance_scoring:
  # Enable/disable performance scoring calculations
  enabled: true

  # Weights for different debate outcomes
  weights:
    successful_critique: 3.0       # Critiques that won (critique_valid) - highest reward
    successful_rebuttal: 2.0       # Rebuttals that won (rebuttal_valid) - moderate reward
    failed_rebuttal: -2.0          # Rebuttals that lost (critique_valid) - moderate penalty
    unresolved_argument: -0.5      # Arguments with unclear outcomes - minor penalty

  # Calculate normalized score (score / total_arguments)
  # Useful for comparing agents across debates with different argument counts
  normalize_by_total_arguments: false

  # Display options
  display_in_round_summary: true   # Show performance scores after each round
  display_in_final_summary: true   # Show performance scores in final statistics

# ============================================================================
# CONVERGENCE METRICS
# ============================================================================
# Measures semantic convergence by analyzing claim-level agreement between agents
# Complements trajectory visualization with quantitative convergence scores
convergence:
  # Enable/disable convergence analysis
  enabled: true

  # Semantic similarity threshold for claim matching (0.0-1.0)
  # Higher = stricter matching (claims must be more semantically similar)
  # 0.75 recommended: captures paraphrased claims without false matches
  # 0.85 = very strict (only nearly identical claims match)
  # 0.65 = more lenient (related claims may match)
  similarity_threshold: 0.75

  # Display options
  display_in_round_summary: true   # Show convergence analysis after each round
  display_in_final_summary: true   # Show convergence trajectory in final statistics

  # Track convergence history over rounds
  track_history: true

# ============================================================================
# OUTPUT CONFIGURATION
# ============================================================================
outputs:
  # Directory where all outputs will be saved
  storage_dir: "src/chal/storage"

  # --- Narrative Outputs ---

  # Scribed narrative synthesis (requires scribe.enabled = true)
  save_synthesis: true
  synthesis_file: "debate_synthesis.txt"

  # Clean markdown transcript of the debate (human-readable)
  save_transcript: true
  transcript_file: "debate_transcript.txt"

  # --- Belief Snapshots ---

  # Save initial agent beliefs from Stage 1
  save_initial_beliefs: true
  initial_beliefs_file: "initial_beliefs.txt"

  # Save final agent beliefs after all updates
  save_final_beliefs: true
  final_beliefs_file: "final_beliefs.txt"

  # --- Analysis Outputs ---

  # Generate belief embeddings for trajectory visualization
  # (Enables semantic analysis of belief evolution)
  generate_embeddings: true
  embeddings_file: "embeddings.npz"

  # Plot 2D visualization of belief trajectories over time
  # (Requires generate_embeddings = true)
  plot_trajectories: true
  trajectory_plot_file: "belief_trajectories.png"

  # Generate interactive HTML belief graph visualization
  # (Shows argument structure as interactive node-edge graph using Cytoscape.js)
  generate_graph_visualization: false
  graph_file: "belief_graph.html"

  # Save statistics about agent performance (wins, losses, etc.)
  save_agent_stats: true
  stats_file: "agent_stats.json"

  # --- Debug Logging ---

  # Save comprehensive debug log with all prompts, responses, and parsing details
  # (Essential for debugging - shows complete model I/O)
  save_debug_log: true
  debug_log_file: "log.txt"

# ============================================================================
# SCRIBE CONFIGURATION
# ============================================================================
# The scribe generates a flowing narrative synthesis of the entire debate
scribe:
  # Enable/disable Stage 7 scribing
  # (Disable to save time during development)
  enabled: true

  # Model to use for narrative generation
  model: "gpt-4o"

  # Chunking parameters for long transcripts
  max_chars_per_chunk: 15000           # Max characters per chunk (stay within context limits)
  overlap_chars: 1000                  # Overlap between chunks for continuity

  # Scribe generation settings
  scribe_temperature: 0.3              # Slightly higher than generation_temperature for natural prose

  # Style guidance for the narrative
  style_hint: "formal, expository, research-paper tone with clear sectioning and didactic explanations"

# ============================================================================
# DEFENSE BOOST SETTINGS
# ============================================================================
# Mechanical strength increases for nodes that survive adversarial challenges.
# When a node is targeted by a critique and the rebuttal wins (REBUTTAL_VALID),
# the system automatically applies a formula-driven strength boost.
#
# Formula: boost(n) = min(base_boost + boost_increment * n, max_boost_per_defense)
# Ceiling: min(current + boost, original_strength + max_cumulative_boost, 1.0)
# Where n = consecutive successful defenses (1-indexed).
#
# The boost resets to 0 consecutive defenses when a node loses a defense
# (CRITIQUE_VALID). Nodes not attacked in a round are unchanged.
defense_boost:
  enabled: true                    # Master switch — set false to disable all defense boosts
  base_boost: 0.02                # Starting constant in the formula (default: 0.02)
  boost_increment: 0.01           # Added per consecutive defense (default: 0.01)
  max_boost_per_defense: 0.05     # Maximum boost for a single defense (default: 0.05)
  max_cumulative_boost: 0.20      # Maximum total boost above original_strength (default: 0.20)

# ============================================================================
# PARALLELIZATION SETTINGS
# ============================================================================
# Fire independent API calls concurrently within each stage to reduce latency.
# Requires no code changes to agents — uses ThreadPoolExecutor internally.
# Off by default; enable to speed up stages 1, 2, 3 (rebuttal), 4, and 6.
#
parallel:
  enabled: true                      # Master switch (default: false)
  max_workers: 5                     # Max concurrent threads (default: 5)
