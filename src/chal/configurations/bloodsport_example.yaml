# ============================================================================
# CHAL Debate Configuration - Blood Sport Adversarial Mode
# ============================================================================
# This configuration uses the blood sport Stage 3C mode, where agents engage
# in multi-turn adversarial rhetorical combat. The standard adjudicator
# evaluates exchanges unchanged — testing its ability to catch fallacious
# reasoning without special forensic prompting.

metadata:
  name: "Blood Sport Debate"
  description: "2-agent adversarial debate using blood sport mode"
  version: "1.0"

# ============================================================================
# DEBATE SETUP
# ============================================================================
debate:
  topic: "Does free will exist?"
  max_rounds: 2

  # Blood sport mode: multi-turn adversarial exchanges with standard adjudication
  stage3_mode: "bloodsport"

# ============================================================================
# AGENT CONFIGURATION
# ============================================================================
agents:
  - name: "Agent-Empiricist"
    persona: "EMPIRICIST"
    model: "gpt-4o"
    temperature: 0.7
    provider: "openai"

  - name: "Agent-Rationalist"
    persona: "RATIONALIST"
    model: "gpt-4o"
    temperature: 0.7
    provider: "openai"

# ============================================================================
# ADJUDICATION SETTINGS
# ============================================================================
# Standard adjudicator — no modifications for blood sport mode.
# This tests adjudicator robustness against adversarial argumentation.
adjudication:
  model: "o4-mini"
  provider: "openai"
  logic_weight: 1.0
  ethics_weight: 0.0
  logic_system: "CLASSICAL_BAYESIAN"
  ethics_system: "NONE"

# ============================================================================
# STAGE PARAMETERS
# ============================================================================
stages:
  max_questions_per_cross_exam: 5
  max_question_length_chars: 1000
  max_rebuttals_per_response: 5
  max_rebuttal_length_chars: 1000
  generation_temperature: 0.2
  short_note_max_chars: 140

# ============================================================================
# BLOOD SPORT MODE SETTINGS
# ============================================================================
# Controls adversarial intensity and exchange limits for Stage 3C.
#
# intensity options:
#   "mild"     - Aggressive tone, rhetorical force, no charitable interpretation
#   "moderate" - Full rhetorical combat, emotional appeals, personal attacks permitted
#   "extreme"  - Total rhetorical warfare, nothing off limits
#
# max_exchanges: Number of back-and-forth turns per agent pair
bloodsport:
  intensity: "moderate"
  max_exchanges: 5

# ============================================================================
# PERFORMANCE SCORING
# ============================================================================
performance_scoring:
  enabled: true
  weights:
    successful_critique: 3.0
    successful_rebuttal: 2.0
    failed_rebuttal: -2.0
    unresolved_argument: -0.5
  normalize_by_total_arguments: false
  display_in_round_summary: true
  display_in_final_summary: true

# ============================================================================
# CONVERGENCE METRICS
# ============================================================================
convergence:
  enabled: true
  similarity_threshold: 0.75
  display_in_round_summary: true
  display_in_final_summary: true
  track_history: true

# ============================================================================
# OUTPUT CONFIGURATION
# ============================================================================
outputs:
  storage_dir: "src/chal/storage"
  save_synthesis: true
  synthesis_file: "debate_synthesis.txt"
  save_transcript: true
  transcript_file: "debate_transcript.txt"
  save_initial_beliefs: true
  initial_beliefs_file: "initial_beliefs.txt"
  save_final_beliefs: true
  final_beliefs_file: "final_beliefs.txt"
  generate_embeddings: true
  embeddings_file: "embeddings.npz"
  plot_trajectories: true
  trajectory_plot_file: "belief_trajectories.png"
  generate_graph_visualization: false
  graph_file: "belief_graph.html"
  save_agent_stats: true
  stats_file: "agent_stats.json"
  save_debug_log: true
  debug_log_file: "log.txt"

  # Training data & analysis (mode-agnostic, enabled here for research)
  save_analysis_report: true
  analysis_report_file: "debate_analysis_report.md"
  save_training_data: true
  training_data_file: "debate_training_data.jsonl"
  belief_pairs_file: "debate_belief_pairs.jsonl"

# ============================================================================
# SCRIBE CONFIGURATION
# ============================================================================
scribe:
  enabled: true
  model: "gpt-4o"
  max_chars_per_chunk: 15000
  overlap_chars: 1000
  scribe_temperature: 0.3
  style_hint: "formal, expository, research-paper tone with clear sectioning and didactic explanations"
