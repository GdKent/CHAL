# ============================================================================
# CHAL Debate Configuration - xAI (Grok) Test
# ============================================================================
# Runs a complete debate using xAI's Grok models.
# Requires XAI_API_KEY to be set in your .env file.
#
# Obtain your API key at: https://console.x.ai/
#
# Run with:
#   python run_debate.py --config xai_test

metadata:
  name: "xAI Grok Test"
  description: "Quick debate using xAI Grok models."
  version: "1.0"

# ============================================================================
# DEBATE SETUP
# ============================================================================
debate:
  topic: "Does free will exist?"
  max_rounds: 1

# ============================================================================
# AGENT CONFIGURATION
# ============================================================================
agents:
  - name: "Agent-Empiricist"
    persona: "EMPIRICIST"
    model: "grok-3-mini"
    temperature: 0.7
    provider: "xai"                    # LLM provider: "openai" | "anthropic" | "google" | "ollama" | "xai" | "perplexity"

  - name: "Agent-Supernaturalist"
    persona: "SUPERNATURALIST"
    model: "grok-3-mini"
    temperature: 0.7
    provider: "xai"

# ============================================================================
# ADJUDICATION SETTINGS
# ============================================================================
adjudication:
  model: "grok-3-mini"
  provider: "xai"                      # LLM provider: "openai" | "anthropic" | "google" | "ollama" | "xai" | "perplexity"
  logic_weight: 1.0
  ethics_weight: 0.0
  logic_system: "Classical logic + Bayesian reasoning"
  ethics_system: "None"

# ============================================================================
# STAGE PARAMETERS
# ============================================================================
stages:
  max_questions_per_cross_exam: 3
  max_question_length_chars: 300
  max_rebuttals_per_response: 3
  max_rebuttal_length_chars: 300
  generation_temperature: 0.2
  short_note_max_chars: 140

# ============================================================================
# OUTPUT CONFIGURATION
# ============================================================================
outputs:
  storage_dir: "src/chal/storage/xai_test"
  save_synthesis: false
  synthesis_file: "debate_synthesis.txt"
  save_transcript: true
  transcript_file: "debate_transcript.txt"
  save_initial_beliefs: true
  initial_beliefs_file: "initial_beliefs.txt"
  save_final_beliefs: true
  final_beliefs_file: "final_beliefs.txt"
  generate_embeddings: false
  embeddings_file: "embeddings.npz"
  plot_trajectories: false
  trajectory_plot_file: "belief_trajectories.png"
  generate_graph_visualization: false
  graph_file: "belief_graph.html"
  save_agent_stats: true
  stats_file: "agent_stats.json"
  save_debug_log: true
  debug_log_file: "log.txt"

# ============================================================================
# SCRIBE CONFIGURATION
# ============================================================================
scribe:
  enabled: false
  model: "grok-3-mini"
  max_chars_per_chunk: 15000
  overlap_chars: 1000
  scribe_temperature: 0.3
  style_hint: "concise summary style"
