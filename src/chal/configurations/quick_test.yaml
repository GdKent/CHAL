# ============================================================================
# CHAL Debate Configuration - Quick Test
# ============================================================================
# Minimal configuration optimized for FAST testing and development.
# Disables time-consuming features (embeddings, plotting, scribing).

metadata:
  name: "Quick Test"
  description: "Fast minimal debate for testing and development"
  version: "1.0"

# ============================================================================
# DEBATE SETUP
# ============================================================================
debate:
  # Testing with a different topic for variety
  topic: "Is artificial intelligence conscious?"

  # Single round for speed
  max_rounds: 1

# ============================================================================
# AGENT CONFIGURATION
# ============================================================================
# Using different personas than default for variety
agents:
  - name: "Agent-Rationalist"
    persona: "RATIONALIST"             # Relies on logical deduction
    model: "gpt-4o"
    temperature: 0.7
    provider: "openai"                 # LLM provider: "openai" | "anthropic" | "google"

  - name: "Agent-Skeptic"
    persona: "SKEPTIC"                 # Questions all certainty
    model: "gpt-4o"
    temperature: 0.7
    provider: "openai"

# ============================================================================
# ADJUDICATION SETTINGS
# ============================================================================
adjudication:
  model: "gpt-4o"
  provider: "openai"                   # LLM provider: "openai" | "anthropic" | "google"
  logic_weight: 1.0
  ethics_weight: 0.0
  logic_system: "CLASSICAL_BAYESIAN"
  ethics_system: "NONE"

# ============================================================================
# STAGE PARAMETERS
# ============================================================================
# REDUCED for faster execution
stages:
  # Fewer questions/rebuttals = faster debate
  max_questions_per_cross_exam: 3      # ⚡ Reduced from 5
  max_rebuttals_per_response: 3        # ⚡ Reduced from 5

  # Character limits (same as default)
  max_question_length_chars: 500
  max_rebuttal_length_chars: 500

  # Generation settings
  generation_temperature: 0.2

  # Text length limits
  short_note_max_chars: 140

# ============================================================================
# OUTPUT CONFIGURATION
# ============================================================================
outputs:
  # Separate storage directory for test outputs
  storage_dir: "src/chal/storage/quick_test"

  # --- Narrative Outputs ---

  # No synthesis (scribe disabled)
  save_synthesis: false                # ⚡ Disabled (scribe is off)
  synthesis_file: "debate_synthesis.txt"

  # Still save transcript for review
  save_transcript: true
  transcript_file: "debate_transcript.txt"

  # --- Belief Snapshots ---

  save_initial_beliefs: true
  initial_beliefs_file: "initial_beliefs.txt"

  save_final_beliefs: true
  final_beliefs_file: "final_beliefs.txt"

  # --- Analysis Outputs ---

  # No embeddings/plotting (slow)
  generate_embeddings: false           # ⚡ Disabled (time-consuming)
  embeddings_file: "embeddings.npz"

  plot_trajectories: false             # ⚡ Disabled (requires embeddings)
  trajectory_plot_file: "belief_trajectories.png"

  # Still track stats
  save_agent_stats: true
  stats_file: "agent_stats.json"

  # --- Debug Logging ---

  # Keep debug log enabled for testing/debugging
  save_debug_log: true                 # ✅ Enabled even in quick test
  debug_log_file: "log.txt"

# ============================================================================
# SCRIBE CONFIGURATION
# ============================================================================
# DISABLED for speed
scribe:
  enabled: false                       # ⚡ Disabled (saves significant time)
  model: "gpt-4o"
  max_chars_per_chunk: 15000
  overlap_chars: 1000
  scribe_temperature: 0.3
  style_hint: "concise summary style"
