# ============================================================================
# CHAL Debate Configuration - Ollama Local Test
# ============================================================================
# Runs a complete debate using locally-hosted models via Ollama.
# No API keys required — all inference runs on localhost, free of charge.
#
# Prerequisites:
#   ollama pull deepseek-r1:14b
#
# Run with:
#   python run_debate.py --config ollama_test

metadata:
  name: "Ollama Local Test"
  description: "Quick debate using local Ollama models. No API keys required."
  version: "1.0"

# ============================================================================
# DEBATE SETUP
# ============================================================================
debate:
  topic: "Does free will exist?"
  max_rounds: 1

# ============================================================================
# AGENT CONFIGURATION
# ============================================================================
agents:
  - name: "Agent-Empiricist"
    persona: "EMPIRICIST"
    model: "deepseek-r1:14b"           # Run first: ollama pull deepseek-r1:14b
    temperature: 0.7
    provider: "ollama"                 # LLM provider: "openai" | "anthropic" | "google" | "ollama"

  - name: "Agent-Supernaturalist"
    persona: "SUPERNATURALIST"
    model: "deepseek-r1:14b"
    temperature: 0.7
    provider: "ollama"

# ============================================================================
# ADJUDICATION SETTINGS
# ============================================================================
adjudication:
  model: "deepseek-r1:14b"
  provider: "ollama"                   # LLM provider: "openai" | "anthropic" | "google" | "ollama"
  logic_weight: 1.0
  ethics_weight: 0.0
  logic_system: "Classical logic + Bayesian reasoning"
  ethics_system: "None"

# ============================================================================
# STAGE PARAMETERS
# ============================================================================
stages:
  max_questions_per_cross_exam: 3      # Reduced for faster local runs
  max_question_length_chars: 300
  max_rebuttals_per_response: 3        # Reduced for faster local runs
  max_rebuttal_length_chars: 300
  generation_temperature: 0.2
  short_note_max_chars: 140

# ============================================================================
# OUTPUT CONFIGURATION
# ============================================================================
outputs:
  storage_dir: "src/chal/storage/ollama_test"
  save_synthesis: false
  synthesis_file: "debate_synthesis.txt"
  save_transcript: true
  transcript_file: "debate_transcript.txt"
  save_initial_beliefs: true
  initial_beliefs_file: "initial_beliefs.txt"
  save_final_beliefs: true
  final_beliefs_file: "final_beliefs.txt"
  generate_embeddings: false           # Disabled — time-consuming
  embeddings_file: "embeddings.npz"
  plot_trajectories: false             # Requires embeddings
  trajectory_plot_file: "belief_trajectories.png"
  generate_graph_visualization: false
  graph_file: "belief_graph.html"
  save_agent_stats: true
  stats_file: "agent_stats.json"
  save_debug_log: true
  debug_log_file: "log.txt"

# ============================================================================
# SCRIBE CONFIGURATION
# ============================================================================
scribe:
  enabled: false                       # Disabled for speed
  model: "deepseek-r1:14b"
  max_chars_per_chunk: 15000
  overlap_chars: 1000
  scribe_temperature: 0.3
  style_hint: "concise summary style"
