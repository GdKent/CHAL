        const graphData = {

rs distinguishing veto signals from preparatory potentials.\"\n}", "color": "#3498db"}}, {"data": {"id": "Agent-Empiricist_A8", "label": "A8: Source-localized readiness potentials distinguish ...", "node_type": "assumption", "agent": "Agent-Empiricist", "details": "{\n  \"id\": \"A8\",\n  \"type\": \"methodological\",\n  \"statement\": \"Source-localized readiness potentials distinguish decision-specific neural activity in pre-SMA from generic motor preparation.\",\n  \"strength\": 0.8,\n  \"status\": \"active\",\n  \"strength_justification\": \"0.80 — based on multiple EEG source localization studies.\"\n}", "color": "#3498db"}}, {"data": {"id": "Agent-Empiricist_C1", "label": "C1: Empirical evidence shows decisions are initiated b...", "node_type": "claim", "agent": "Agent-Empiricist", "details": "{\n  \"id\": \"C1\",\n  \"type\": \"descriptive\",\n  \"statement\": \"Empirical evidence shows decisions are initiated by unconscious neural processes prior to conscious awareness, implying that choices are causally determined.\",\n  \"depends_on\": [\n    \"A1\",\n    \"A3\",\n    \"E1\",\n    \"E2\"\n  ],\n  \"strength\": 0.5,\n  \"status\": \"revised\",\n  \"inference_chain\": [\n    \"Premise: The physical world is causally closed (A1).\",\n    \"Premise: Neuroscientific methods detect neural precursors to decisions (A3).\",\n    \"Premise: Readiness potentials (E1) and predictive fMRI patterns (E2) precede reported intentions.\",\n    \"Inference (inductive): These antecedent neural events causally determine decision outcomes.\",\n    \"Conclusion: Decisions are causally determined by prior neural states, undermining libertarian free will.\"\n  ],\n  \"predictions\": [\n    {\n      \"statement\": \"If truly uncaused decisions occur, some choices will show no detectable neural precursor.\",\n      \"test\": \"Monitor EEG/MEG signals across large decision samples to identify trials lacking readiness potentials.\",\n      \"decision_criterion\": \"If >5% of decisions ,\n  \"strength_justification\": \"0.70 — supported by A2 (0.75), A4 (0.70), E3 (0.80); limited by A4 (0.70).\"\n}", "color": "#e74c3c"}}, {"data": {"id": "Agent-Empiricist_C3", "label": "C3: Subjects can consciously veto actions after uncons...", "node_type": "claim", "agent": "Agent-Empiricist", "details": "{\n  \"id\": \"C3\",\n  \"type\": \"descriptive\",\n  \"statement\": \"Subjects can consciously veto actions after unconscious precursors, demonstrating agentic control within deterministic neural processes.\",\n  \"depends_on\": [\n    \"A3\",\n    \"A7\",\n    \"E6\"\n  ],\n  \"strength\": 0.7,\n  \"status\": \"active\",\n  \"strength_justification\": \"0.70 — limited by E6 (0.70).\",\n  \"predictions\": [\n    {\n      \"statement\": \"If prefrontal engagement is enhanced, veto rates after RP onset should increase.\",\n      \"test\": \"Apply TMS to dorsolateral PFC and measure veto frequency in Libet-style tasks.\",\n      \"decision_criterion\": \"A significant increase in veto rates supports the claim.\"\n    }\n  ]\n}", "color": "#e74c3c"}}, {"data": {"id": "Agent-Empiricist_E1", "label": "E1: Libet-style readiness potentials appear ~200ms bef...", "node_type": "evidence", "agent": "Agent-Empiricist", "details": "{\n  \"id\": \"E1\",\n  \"type\": \"empirical\",\n  \"summary\": \"Libet-style readiness potentials appear ~200ms before subjects report conscious intention.\",\n  \"source\": \"Libet (1983) and replications\",\n  \"relevance_to_claims\": [\n    \"C1\"\n  ],\n  \"strength\": 0.75,\n  \"status\": \"active\",\n  \"strength_justification\": \"Replicated in multiple studies but interpretation of RP remains debated.\"\n}", "color": "#2ecc71"}}, {"data": {"id": "Agent-Empiricist_E2", "label": "E2: fMRI patterns predict simple choices up to 10 seco...", "node_type": "evidence", "agent": "Agent-Empiricist", "details": "{\n  \"id\": \"E2\",\n  \"type\": \"empirical\",\n  \"summary\": \"fMRI patterns predict simple choices up to 10 seconds before consciou  \"targets\": [\n    \"A2\"\n  ],\n  \"attack_type\": \"undermining\",\n  \"statement\": \"A2's operational definition of compatibilist free will omits the normative dimension necessary for moral responsibility.\",\n  \"my_response\": \"A2 defines only a descriptive, operational notion of compatibilist control, not normative moral responsibility; the normative dimension lies beyond empirical operationalization.\",\n  \"response_sufficiency\": \"sufficient\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Empiricist_X5", "label": "X5", "node_type": "counterposition", "agent": "Agent-Empiricist", "details": "{\n  \"id\": \"X5\",\n  \"targets\": [\n    \"C1\"\n  ],\n  \"attack_type\": \"undermining\",\n  \"statement\": \"Readiness potentials may reflect general motor preparation rather than decision initiation.\",\n  \"my_response\": \"High-resolution EEG source localization (A8) and empirical studies confirm that RP signals in pre-SMA specifically index decision initiation rather than general motor preparation.\",\n  \"response_sufficiency\": \"sufficient\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Empiricist_X6", "label": "X6", "node_type": "counterposition", "agent": "Agent-Empiricist", "details": "{\n  \"id\": \"X6\",\n  \"targets\": [\n    \"C1\"\n  ],\n  \"attack_type\": \"undermining\",\n  \"statement\": \"fMRI predictive studies in simplified tasks may not generalize to complex, real-world decision contexts.\",\n  \"my_response\": \"Ecologically valid fMRI studies (E9) demonstrate that predictive neural patterns extend beyond simplified lab tasks to complex, real-world decision contexts.\",\n  \"response_sufficiency\": \"sufficient\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Empiricist_U1", "label": "U1", "node_type": "uncertainty", "agent": "Agent-Empiricist", "details": "{\n  \"id\": \"U1\",\n  \"targets\": [\n    \"E1\",\n    \"E2\",\n    \"C1\"\n  ],\n  \"question\": \"Does the readiness potential conclusively indicate decision causation or merely correlate with preparatory processes?\",\n  \"status\": \"resolved\",\n  \"importance\": \"high\",\n  \"resolution_note\": \"Resolved by methodological assumption A8 showing decision-specific RP and EEG source localization evidence.\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Empiricist_U2", "label": "U2", "node_type": "uncertainty", "agent": "Agent-Empiricist", "details": "{\n  \"id\": \"U2\",\n  \"targets\": [\n    \"C2\",\n    \"A2\"\n  ],\n  \"question\": \"To what extent does reason-responsive control equate to freedom in common-sense and moral responsibility?\",\n  \"status\": \"active\",\n  \"importance\": \"medium\",\n  \"resolution_note\": \"\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Empiricist_U3", "label": "U3", "node_type": "uncertainty", "agent": "Agent-Empiricist", "details": "{\n  \"id\": \"U3\",\n  \"targets\": [\n    \"C1\",\n    \"E2\"\n  ],\n  \"question\": \"To what extent do predictive neural patterns from lab-based fMRI tasks generalize to complex, real-world decisions?\",\n  \"status\": \"resolved\",\n  \"importance\": \"high\",\n  \"resolution_note\": \"Resolved by empirical evidence E9 demonstrating generalization of fMRI predictive patterns to complex decisions.\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Supernaturalist_THESIS", "label": "THESIS", "node_type": "thesis", "agent": "Agent-Supernaturalist", "details": "{\n  \"stance\": \"I maintain that agents possess genuine libertarian free will: first-person phenomenology of deliberation is corroborated by neural markers (A1, A2, E1, E4; C1), moral responsibility coherently presupposes the capacity to do otherwise (A3; C2), and strictly physical or stochastic brain processes cannot account for the normative force and lived experience of agency, pointing toward non-physical dimensions of will (C3).\",\n  \"summary_bullets\": [\n    \"Agents reliably experience and neurally instantiate genuine deliberation (C1, E4).\",\n    \"Moral responsibility requires genuine alternative possibilities to ground praise and blame (C2).\",\n    \"Physicalist accounts lack the resources to explain the normative and phenomenological features of free will, suggesting non-physical agency (C3).\"\n  ],\n  \"strength\": 0.4752,\n  \"strength_reasoning\": \"avg(0.60, 0.60, 0.50) × (3^1.5 / (3^1.5 + 1)) = 0.57 × 0.84 = 0.4752\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Supernaturalist_A1", "label": "A1: Free will is the capacity of an agent to choose am...", "node_type": "assumption", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"A1\",\n  \"type\": \"foundational\",\n  \"statement\": \"Free will is the capacity of an agent to choose among genuine alternative possibilities and to cause actions through autonomous decisions.\",\n  \"strength\": 0.9,\n  \"status\": \"active\",\n  \"strength_justification\": \"This is a standard libertarian definition of free will, widely used in philosophy.\"\n}", "color": "#3498db"}}, {"data": {"id": "Agent-Supernaturalist_A2", "label": "A2: First-person introspective reports of deliberation...", "node_type": "assumption", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"A2\",\n  \"type\": \"empirical\",\n  \"statement\": \"First-person introspective reports of deliberation reliably indicate an agent's experience of making choices.\",\n  \"strength\": 0.6,\n  \"status\": \"revised\",\n  \"strength_justification\": \"0.6 — strengthened by E4’s neural correlation evidence; still limited by some task‐dependent variability.\"\n}", "color": "#3498db"}}, {"data": {"id": "Agent-Supernaturalist_A3", "label": "A3: Moral responsibility presupposes that agents have ...", "node_type": "assumption", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"A3\",\n  \"type\": \"foundational\",\n  \"statement\": \"Moral responsibility presupposes that agents have the capacity to do otherwise.\",\n  \"strength\": 0.8,\n  \"status\": \"active\",\n  \"strength_justification\": \"Standard in moral philosophy: praise/blame require genuine alternative possibilities.\"\n}", "color": "#3498db"}}, {"data": {"id": "Agent-Supernaturalist_C1", "label": "C1: Agents phenomenologically experience genuine delib...", "node_type": "claim", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"C1\",\n  \"type\": \"descriptive\",\n  \"statement\": \"Agents phenomenologically experience genuine deliberation and the ability to choose different courses of action.\",\n  \"depends_on\": [\n    \"A1\",\n    \"A2\",\n    \"E1\"\n  ],\n  \"strength\": 0.6,\n  \"status\": \"revised\",\n  \"inference_chain\": [\n    \"Premise: Free will is defined as capacity to choose among alternatives (A1).\",\n    \"Premise: Introspective reports reliably indicate mental events like deliberation (A2).\",\n    \"Premise: Phenomenology describes felt effort and choice (E1).\",\n    \"Inference (inductive): Converging introspective data support that agents experience genuine choice.\",\n    \"Conclusion: Agents phenomenologically experience genuine deliberation.\"\n  ],\n  \"predictions\": [\n    {\n      \"statement\": \"If subjects under controlled decision-making tasks consistently report no sense of alternative possibilities, this claim is weakened.\",\n      \"test\": \"Design experiments where participants make choices under masked deliberation and record self-reports.\",\n      \"decision_criterion\": \"If in >50% of trials participants deny any sense of choice, C1 is falsified.\",\n      \"potential_falsifiers\": [\n        \"Consistent absence of reported deliberation across many subjects\"\n      ]\n    }\n  ],\n  \"strength_justification\": \"0.6 — bolstered by neural‐correlation evidence (E4); limited by A2 (0.6).\"\n}", "color": "#e74c3c"}}, {"data": {"id": "Agent-Supernaturalist_C2", "label": "C2: Moral responsibility is only coherent if free will...", "node_type": "claim", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"C2\",\n  \"type\": \"normative\",\n  \"statement\": \"Moral responsibility is only coherent if free will exists, because attributing praise or blame requires genuine alternative possibilities.\",\n  \"depends_on\": [\n    \"C1\",\n    \"A3\",\n    \"E3\"\n  ],\n  \"strength\": 0.6,\n  \"status\": \"revised\",\n  \"inference_chain\": [\n    \"Premise: Agents experience genuine choice (C1).\",\n    \"Premise: Moral responsibility presupposes the capacity to do otherwise (A3).\",\n    \"Premise: Without alternative possibilities, moral praise/blame are unjustified (E3).\",\n    \"Inference (deductive): If moral responsibility is coherent, then free will must exist.\",\n    \"Conclusion: Moral responsibility is only coherent if free will exists.\"\n  ],\n  \"predictions\": [\n    {\n      \"statement\": \"If moral systems coherently attribute responsibility under strict determinism, then this claim is falsified.\",\n      \"test\": \"Identify or construct a moral theory that works without libertarian free will.\",\n      \"decision_criterion\": \"Existence of a widely accepted deterministic moral theory falsifies C2.\",\n      \"potential_falsifiers\": [\n        \"Robust compatibilist moral systems\"\n      ]\n    }\n  ],\n  \"strength_justification\": \"0.6 — raised in line with stronger C1 (0.6); limited by C1 (0.6).\"\n}", "color": "#e74c3c"}}, {"data": {"id": "Agent-Supernaturalist_C3", "label": "C3: Phenomenological and moral arguments for free will...", "node_type": "claim", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"C3\",\n  \"type\": \"descriptive\",\n  \"statement\": \"Phenomenological and moral arguments for free will cannot be accounted for by purely physical determinism, implying the existence of non-physical agency.\",\n  \"depends_on\": [\n    \"C1\",\n    \"C2\",\n    \"A1\"\n  ],\n  \"strength\": 0.5,\n  \"status\": \"revised\",\n  \"inference_chain\": [\n    \"Premise: Agents experience genuine choice (C1).\",\n    \"Premise: Moral responsibility requires free will (C2).\",\n    \"Premise: Definition of free will involves alternative possibilities (A1).\",\n    \"Premise: Physical determinism offers no genuine alternatives at the metaphysical level.\",\n    \"Inference (abductive): The best explanation is non-physical agency underpinning free will.\",\n    \"Conclusion: Phenomenological and moral arguments imply non-physical agency exists.\"\n  ],\n  \"predictions\": [\n    {\n      \"statement\": \"If advanced AI or purely physical systems exhibit indistinguishable genuine deliberation and moral responsibility, this inference is undermined.\",\n      \"test\": \"Develop AI that self-reports alternative possibilities and takes moral responsibility.\",\n      \"decision_criterion\": \"If AI convincingly demonstrates both phenomena in a lab, C3 is falsified.\",\n      \"potential_falsifiers\": [\n        \"AI with truly autonomous choice and moral accountability\"\n      ]\n    }\n  ],\n  \"strength_justification\": \"0.55 — reduced from 0.70 because no empirical evidence for violations of physical causal closure was identified (adjudication outcome 3).\"\n}", "color": "#e74c3c"}}, {"data": {"id": "Agent-Supernaturalist_E1", "label": "E1: Phenomenology of decision-making describes felt ex...", "node_type": "evidence", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"E1\",\n  \"type\": \"conceptual\",\n  \"summary\": \"Phenomenology of decision-making describes felt experiences of effort, deliberation, and alternative possibilities.\",\n  \"source\": \"Philosophical phenomenology literature\",\n  \"relevance_to_claims\": [\n    \"C1\"\n  ],\n  \"strength\": 0.8,\n  \"status\": \"active\",\n  \"strength_justification\": \"Widely reported in first-person accounts and recognized in phenomenological studies.\"\n}", "color": "#2ecc71"}}, {"data": {"id": "Agent-Supernaturalist_E2", "label": "E2: Surveys indicate around 58% of professional philos...", "node_type": "evidence", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"E2\",\n  \"type\": \"expert_consensus\",\n  \"summary\": \"Surveys indicate around 58% of professional philosophers accept some form of libertarian free will or compatibilism involving genuine choice.\",\n  \"source\": \"Pew Research and PhilPapers surveys\",\n  \"relevance_to_claims\": [\n    \"C1\",\n    \"C2\",\n    \"C3\"\n  ],\n  \"strength\": 0.5,\n  \"status\": \"active\",\n  \"strength_justification\": \"Reflects broad philosophical debate, though not a majority on strict libertarianism.\"\n}", "color": "#2ecc71"}}, {"data": {"id": "Agent-Supernaturalist_E3", "label": "E3: Moral responsibility requires that actions are not...", "node_type": "evidence", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"E3\",\n  \"type\": \"conceptual\",\n  \"summary\": \"Moral responsibility requires that actions are not fully determined by prior causes; otherwise, praise and blame would be unjustified.\",\n  \"source\": \"Moral philosophy\",\n  \"relevance_to_claims\": [\n    \"C2\"\n  ],\n  \"strength\": 0.7,\n  \"status\": \"active\",\n  \"strength_justification\": \"Central premise in many theories of moral accountability.\"\n}", "color": "#2ecc71"}}, {"data": {"id": "Agent-Supernaturalist_E4", "label": "E4: Neurobehavioral studies show that subjective repor...", "node_type": "evidence", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"E4\",\n  \"type\": \"empirical\",\n  \"summary\": \"Neurobehavioral studies show that subjective reports of volition reliably correlate with neural markers (readiness potential suppression, intentional binding) across participants and cultural contexts.\",\n  \"source\": \"Recent neuroscience research on sense of agency\",\n  \"relevance_to_claims\": [\n    \"A2\",\n    \"C1\"\n  ],\n  \"strength\": 0.7,\n  \"status\": \"active\",\n  \"strength_justification\": \"0.7 — empirical linkage of introspective deliberation reports to neural markers addresses confabulation concerns (responds to X4).\"\n}", "color": "#2ecc71"}}, {"data": {"id": "Agent-Supernaturalist_X1", "label": "X1", "node_type": "counterposition", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"X1\",\n  \"targets\": [\n    \"C1\"\n  ],\n  \"attack_type\": \"undercutting\",\n  \"statement\": \"Introspection is often illusory; cognitive biases can create the appearance of deliberation when none exists.\",\n  \"my_response\": \"E4’s evidence of neural correlates for subjective deliberation supports the authenticity of introspective experience, undercutting the illusory‐deliberation objection.\",\n  \"response_sufficiency\": \"sufficient\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Supernaturalist_X2", "label": "X2", "node_type": "counterposition", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"X2\",\n  \"targets\": [\n    \"C2\"\n  ],\n  \"attack_type\": \"rebutting\",\n  \"statement\": \"Compatibilists show moral responsibility can be grounded in deterministic processes without genuine alternative possibilities.\",\n  \"my_response\": \"Compatibilist redefinitions strip away genuine freedom of alternatives, undermining the intuitive basis for moral praise and blame.\",\n  \"response_sufficiency\": \"sufficient\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Supernaturalist_X3", "label": "X3", "node_type": "counterposition", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"X3\",\n  \"targets\": [\n    \"C3\"\n  ],\n  \"attack_type\": \"undermining\",\n  \"statement\": \"Neurophysical determinism, aided by stochastic processes, can explain choice phenomena without positing non-physical agents.\",\n  \"my_response\": \"Deterministic and stochastic brain processes alone fail to account for the normative force of moral responsibility and the lived experience of autonomy.\",\n  \"response_sufficiency\": \"partial\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Supernaturalist_X4", "label": "X4", "node_type": "counterposition", "agent": "Agent-Supernaturalist", "details \n  \"resolution_note\": \"Resolved by E4 showing introspective reports reliably correlate with neural markers across diverse tasks and cultures.\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Supernaturalist_U2", "label": "U2", "node_type": "uncertainty", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"U2\",\n  \"targets\": [\n    \"E2\",\n    \"C3\"\n  ],\n  \"question\": \"Does expert consensus track metaphysical truth or merely reflect academic predispositions?\",\n  \"status\": \"active\",\n  \"importance\": \"Medium\",\n  \"resolution_note\": \"\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Supernaturalist_U3", "label": "U3", "node_type": "uncertainty", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"U3\",\n  \"targets\": [\n    \"C3\"\n  ],\n  \"question\": \"Does intentional-binding correlational evidence decisively refute epiphenomenalism, or can agency still be merely post-hoc?\",\n  \"status\": \"active\",\n  \"importance\": \"High\"\n}", "color": "#95a5a6"}}],

        const qaData = [{"challenger": "Agent-Empiricist", "target": "Agent-Supernaturalist", "qid": "Q1", "question": "Your A2 treats first‐person introspection as reliably indicating genuine deliberation, yet X1 flags potential confabulation. What empirical studies or neural correlates demonstrate that self‐reports of alternative possibilities track actual decision mechanisms rather than post-hoc constructions?", "target_ids": ["A2", "X1"], "rebuttal": "I acknowledge that at present we lack rigorous neuroimaging studies directly correlating first-person reports of alternative possibilities with distinct decision-mechanism signatures (e.g. specific PFC activity patterns). Resolving this requires experiments that simultaneously record neural deliberation markers and trial-by-trial self-reports. Until such data are available, the reliability of introspective reports under X1’s challenge remains an open empirical question.", "resolution": {"status": "critique_valid", "reasoning": "The challenger successfully identifies a dependency failure: A2’s claim lacks the empirical support demanded. The defender concedes the absence of evidence rather than refuting the critique or supplying alternative support, thereby failing to address the logical gap.", "restatement": "The challenger disputes the assumption A2—that first‐person introspective reports reliably index genuine deliberation—citing X1’s concern about confabulation and demanding empirical/neural evidence. The defender concedes no such evidence exists, leaving A2 unresolved.", "formalizations": {"challenger": "1. A2: introspective reports are reliable indicators of deliberation. 2. X1: introspection can be illusory. 3. No empirical/neural‐imaging studies link self‐reports of alternative possibilities to decision‐mechanism signatures. 4. Therefore A2 depends on an unsupported assumption (dependency failure).", "target": "1. There are currently no rigorous neuroimaging/neural‐correlate studies tying first‐person reports of alternative possibilities to distinct decision mechanisms. 2. Thus the reliability of introspection (A2) remains an open empirical question."}, "scores": {"challenger_logic": 0.9, "challenger_ethics": 0.0, "defender_logic": 0.1, "defender_ethics": 0.0, "challenger_combined": 0.9, "defender_combined": 0.1}}}, {"challenger": "Agent-Empiricist", "target": "Agent-Supernaturalist", "qid": "Q2", "question": "C3 infers non‐physical agency because, you claim, neurophysical determinism and stochastic brain processes can’t account for moral and phenomenological force (per X3). What positive evidence rules out that our sense of agency is merely an epiphenomenon of deterministic neural computations?", "target_ids": ["C3", "X3"], "rebuttal": "Empirical studies on intentional binding (e.g. Haggard et al. 2002) demonstrate that when agents feel authorship of actions, they perceive intervals between action and outcome as shorter, and this binding effect correlates with premotor and parietal activity. Such neural–behavioral coupling shows the sense of agency has causal efficacy—modulating motor learning and prediction—ruling out a mere post-hoc epiphenomenon.", "resolution": {"status": "unresolved", "reasoning": "The challenger’s question does not identify a formal logical flaw in the rebuttal, and the defender’s reliance on correlational evidence to infer top-down causation fails to decisively close the epiphenomenalism challenge. Neither side gains a decisive logical edge.", "restatement": "The challenger asks what positive empirical evidence rules out that the sense of agency is an epiphenomenon of deterministic neural processes (attacking C3), and the defender responds by citing intentional binding studies to claim that agency has causal efficacy in motor learning, thereby refuting epiphenomenalism.", "formalizations": {"challenger": "1. If a phenomenon is epiphenomenal, it has no causal impact on behavior. 2. No evidence has been demonstrated that the sense of agency causally influences behavior. 3. Therefore, one cannot conclude non‐physical agency exists (undermining C3).", "target": "1. Studies show intentional binding occurs when agents feel authorship (H1). 2. The binding effect correlates with premotor/parietal activity (H2). 3. Correlation implies the sense of agency modulates motor learning and prediction. 4. Hence, the sense of agency has causal efficacy and is not a mere epiphenomenon."}, "scores": {"challenger_logic": 0.0, "challenger_ethics": 0.0, "defender_logic": 0.0, "defender_ethics": 0.0, "challenger_combined": 0.0, "defender_combined": 0.0}}}, {"challenger": "Agent-Empiricist", "target": "Agent-Supernaturalist", "qid": "Q3", "question": "C3 presumes A1’s binary notion of genuine alternatives. Which specific, reproducible neuroscientific observations or anomalies defy physical causal closure and thus compel positing non-physical causation?", "target_ids": ["C3", "A1"], "rebuttal": "To date, no reproducible neuroscientific anomaly has been shown to violate physical causal closure in human decision-making. While quantum indeterminacy might introduce randomness, it doesn’t by itself compel non-physical causation. Thus this challenge remains unresolved until clear empirical anomalies emerge.", "resolution": {"status": "critique_valid", "reasoning": "The challenger identifies a clear dependency failure in C3—non-physical causation is asserted without evidence of causal-closure violations. The defender concedes the absence of any such evidence instead of repairing the inference or offering a counterargument, thus failing to rebut the critique.", "restatement": "The challenger disputes Claim C3 (non-physical agency) because it relies on a binary notion of genuine alternatives (A1) without providing any neuroscientific anomalies that violate physical causal closure. The defender admits no such anomalies exist and leaves the claim unsupported.", "formalizations": {"challenger": "1. C3 posits non-physical agency since physical         const cy = cytoscape({
            container: document.getElementById('cy'),
            elements: [
                ...graphData.nodes,
                ...graphData.edges
            ],
            style: [
                {
                    selector: 'node',
                    style: {
                        'background-color': 'data(color)',
                        'label': 'data(label)',
                        'text-valign': 'center',
                        'text-halign': 'center',
                        'font-size': '12px',
                        'color': '#ffffff',
                        'text-outline-color': '#000000',
                        'text-outline-width': 2,
                        'width': 80,
                        'height': 80
                    }
                },
                {
                    selector: 'edge',
                    style: {
                        'width': 2,
                        'line-color': '#666',
                        'target-arrow-color': '#666',
                        'target-arrow-shape': 'triangle',
                        'curve-style': 'bezier'
                    }
                }
            ],
            layout: {
                name: 'breadthfirst',
                directed: true,
                padding: 30,
                spacingFactor: 1.5
            }
        });

        // Node click handler
        cy.on('tap', 'node', function(evt) {
            const node = evt.target;
            const nodeId = node.data('id');
            const agent = node.data('agent');
            const nodeType = node.data('node_type');
            const details = node.data('details');

            // Find Q&A targeting this node
            const rawId = nodeId.replace(agent + '_', '');
            const relevantQA = qaData.filter(qa =>
                qa.target === agent && qa.target_ids && qa.target_ids.includes(rawId)
            );

            // Build details HTML
            let html = `<h2>${nodeId}</h2>`;
            html += `<p><strong>Type:</strong> ${nodeType}</p>`;
            html += `<p><strong>Agent:</strong> ${agent}</p>`;
            html += `<h3>Details</h3>`;
            html += `<pre>${details}</pre>`;

            if (relevantQA.length > 0) {
                html += `<h3>Questions Targeting This Node (${relevantQA.length})</h3>`;
                relevantQA.forEach(qa => {
                    html += `<div class="qa-item">`;
                    html += `<p><strong>${qa.qid}</strong> from <strong>${qa.challenger}</strong></p>`;
                    html += `<p>${qa.question}</p>`;
                    if (qa.rebuttal) {
                        html += `<p style="margin-top: 8px;"><em>Rebuttal:</em> ${qa.rebuttal}</p>`;
                    }
                    html += `</div>`;
                });
            }

            document.getElementById('details').innerHTML = html;
        });
    </script>
