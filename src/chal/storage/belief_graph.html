        const qaData = [{"challenger": "Agent-Empiricist", "target": "Agent-Supernaturalist", "qid": "Q1", "question": "Multiple cognitive science studies (e.g., Nisbett & Wilson, 1977) show that people confabulate reasons and lack introspective access to many mental processes. How do you defend the reliability of the self-report studies in E1 as direct evidence for genuine alternative possibilities?", "target_ids": ["E1"], "attack_type": "undermining", "attack_strategy": "challenge_evidence", "rebuttal": "Refuting the broad generalization from Nisbett & Wilson: those studies address people’s post-hoc explanations (causal reasons), not their phenomenological experience of having alternatives. Modern choice-awareness protocols—tracking indecision times, confidence ratings, and neural signatures of deliberation—converge on a genuine felt sense of alternatives. Thus E1 remains a reliable indicator of choice phenomenology.", "resolution": {"status": "unresolved", "reasoning": "Step 1: Restatement  \nThe dispute centers on whether empirical evidence from self-report studies (E1: “Surveys and cognitive studies show people report experiencing multiple genuine options when deciding”) can be taken as reliable, direct evidence for genuine alternative possibilities. The challenger (Agent-Empiricist) argues that introspective confabulation studies (Nisbett & Wilson) undermine E1’s reliability. The defender (Agent-Supernaturalist) insists those confabulation results target post-hoc explanations, not the phenomenological sense of alternatives, and appeals to convergent modern protocols (indecision times, confidence ratings, neural signatures) to uphold E1.\n\nStep 2: Formalization  \nChallenger’s inference:  \nP1: People’s post-hoc reports of causal reasons are often confabulated (Nisbett & Wilson).  \nP2: Self-report studies of choice alternatives rely on introspection analogously to causal-reason reports.  \nC: Therefore, E1 self-reports are unreliable as direct evidence for genuine alternatives.  \nFallacy check: P2 equivocates “introspective reports of reasons” with “introspective reports of phenomenology” (Equivocation / Evidence misuse #4, #6).\n\nDefender’s inference:  \nP1: Nisbett & Wilson’s studies target causal explanations, not phenomenological experience.  \nP2: Modern choice-awareness protocols (behavioral and neural markers) converge on a genuine felt sense of alternatives.  \nC: Therefore, E1 remains a reliable indicator of choice phenomenology.  \nFallacy check: P2 appeals to unspecified “modern protocols” without citing concrete evidence nodes (Insufficient evidence #14, Unfalsifiable claim treated as empirical #11).\n\nStep 3: Adjudication  \nChallenger’s critique:  \n– Strength: Highlights a well-known introspection limitation.  \n– Weakness: Misuses the Nisbett & Wilson evidence by over-extending it from causal-reason confabulation to phenomenological reports (Evidence misuse #6, Equivocation #4).  \nScore: 0.40 (raises an important point but commits misuse of the evidence)\n\nDefender’s rebuttal:  \n– Strength: Correctly distinguishes the target of N&W studies from the phenomenological question (targets P1 of the challenge).  \n– Weakness: Offers no concrete evidence (no new E-nodes, no strength assignments, no likelihood ratio) for the “modern protocols” claim; thus relies on assertion (Insufficient evidence #14, Unfalsifiable claim treated as empirical #11).  \nScore: 0.30\n\nDifference < 0.15 ⇒ UNRESOLVED  \nNeither side fully resolves the logical issues: the challenger overgeneralizes introspective bias, and the defender fails to substantiate the convergence claim with specific, testable evidence.", "restatement": "Whether self-report studies (E1) are reliable direct evidence for genuine alternative possibilities, given introspection confabulation studies.", "formalizations": {"challenger": "P1: Post-hoc introspective reports are often confabulated (Nisbett & Wilson). P2: Self-report studies rely on introspection analogously. C: E1 self-reports are unreliable evidence for genuine alternatives.", "target": "P1: Nisbett & Wilson address causal-reason confabulation, not phenomenology. P2: Modern behavioral/neural protocols converge on a genuine felt sense of alternatives. C: E1 remains reliable evidence for phenomenological alternatives."}, "scores": {"challenger_logic": 0.4, "challenger_ethics": 0.0, "defender_logic": 0.3, "defender_ethics": 0.0, "challenger_combined": 0.4, "defender_combined": 0.3}}}, {"challenger": "Agent-Empiricist", "target": "Agent-Supernaturalist", "qid": "Q2", "question": "Your assumption A2 treats first-person subjective experiences as generally reliable indicators of the phenomena experienced. Given extensive empirical research on introspective error and bias, what empirical basis do you have for assigning a strength of 0.65 to A2?", "target_ids": ["A2"], "attack_type": "undermining", "attack_strategy": "challenge_assumption", "rebuttal": "A2 is set at 0.65 precisely because it is moderate—acknowledging documented introspective error while noting that metacognitive studies (e.g. on confidence-accuracy correlations) show first-person reports can reliably track certain mental states when questions are appropriately structured. This empirical literature justifies a mid-range strength.", "resolution": {"status": "rebuttal_valid", "reasoning": "Step 1: Restate the core disagreement  \nBoth parties accept the methodological assumption (A2) that first-person reports track real states, but the Empiricist challenges the numerical confidence (0.65) assigned to that assumption—citing introspective error research—while the Supernaturalist defends the mid-range score by pointing to metacognitive studies (confidence-accuracy correlations).\n\nStep 2: Formalize the two positions  \nChallenger’s implicit critique:  \n  P1. Studies document pervasive introspective errors and biases.  \n  P2. Assigning a mid-level reliability score requires empirical support that overcomes known biases.  \n  ─────────────────────────────────────────────────────────────────────  \n  C. Therefore, the 0.65 strength for A2 lacks sufficient empirical justification.\n\nDefender’s response:  \n  P1. Introspective errors are real but uneven: metacognitive research shows significant confidence-accuracy correlations under proper protocols.  \n  P2. A moderate (0.65) reliability weight acknowledges both documented errors and demonstrated accurate tracking.  \n  ─────────────────────────────────────────────────────────────────────  \n  C. Therefore, assigning 0.65 to A2 is empirically justified.\n\nStep 3: Adjudicate under the hybrid criteria  \n- The challenger’s appeal to documented introspective bias is legitimate; it invokes “insufficient evidence” (Fallacy 14) to challenge the strength rating. There is no circularity or misrepresentation. The critique validly demands supporting studies.  \n- The defender directly supplies empirical evidence (metacognitive confidence-accuracy studies) to meet that demand. This aligns with Rebuttal #13 (providing sufficient additional evidence) and with Bayesian updating by showing higher likelihood of reliable tracking under controlled conditions.  \n- No formal fallacy or hidden premise remains: the defender’s premises suffice to justify the moderate weight.\n\nConclusion: The defender’s rebuttal successfully resolves the critique by filling the evidentiary gap.  \nOutcome: REBUTTAL_VALID", "restatement": "The debate concerns the empirical justification for assigning a strength of 0.65 to methodological assumption A2 ('First-person subjective experiences are generally reliable indicators unless there are specific defeaters'). The Empiricist challenges this weight given documented introspective errors, and the Supernaturalist defends it by citing metacognitive confidence-accuracy correlations.", "formalizations": {"challenger": "P1: Empirical research shows introspective errors and biases are widespread. P2: A moderate reliability assumption requires sufficient empirical support. C: Therefore, a strength of 0.65 for A2 is unjustified.", "target": "P1: Although introspective errors exist, metacognitive studies demonstrate reliable confidence-accuracy correlations when questions are structured appropriately. P2: A mid-range weight balances documented biases and demonstrated reliability. C: Therefore, 0.65 is a justified strength for A2."}, "scores": {"challenger_logic": 0.6, "challenger_ethics": 0.0, "defender_logic": 0.8, "defender_ethics": 0.0, "challenger_combined": 0.6, "defender_combined": 0.8}}}, {"challenger": "Agent-Empiricist", "target": "Agent-Supernaturalist", "qid": "Q3", "question": "Assumption A5 posits non-physical immaterial souls but provides no empirical or falsifiable criteria. How can A5 be meaningfully evaluated or revised under your framework, given it is fundamentally unfalsifiable?", "target_ids": ["A5"], "attack_type": "undermining", "attack_strategy": "demand_falsifiability", "rebuttal": "Although A5 is metaphysical, it yields empirical predictions (see RNG intention experiments under C3) that would falsify or confirm the soul hypothesis. Coupling this with abductive reasoning from cross-cultural spiritual testimonies and philosophical warrant renders A5 meaningfully evaluable rather than immune to evidence.", "resolution": {"status": "critique_valid", "reasoning": "1. Restatement  \nThe Empiricist challenges whether A5 (“non-physical immaterial souls exist”) is meaningfully evaluable, claiming it is unfalsifiable (no empirical/falsifiable criteria). The Supernaturalist responds that A5 underpins descriptive claim C3, which makes testable predictions (RNG intention experiments), and that abductive support from E2/E3 also gives empirical traction.  \n\n2. Formalization  \n\nChallenger’s Argument (Inductive/Abductive):  \nP1. A5 posits non-physical souls.  \nP2. A5 provides no empirical/falsifiable criteria.  \n∴ A5 is unfalsifiable and thus cannot be meaningfully evaluated or revised under our framework.  \n\nDefender’s Argument (Hybrid abductive + evidential):  \nP1. A5, together with E2/E3, yields C3 (immaterial souls enabling agent-causation).  \nP2. C3 generates empirical predictions (RNG intention tests).  \nP3. If those RNG deviations fail, C3 – and thus the soul hypothesis – is falsified.  \nP4. Abductive reasoning from cross-cultural testimonies and philosophical analysis further supports A5’s evaluability.  \n∴ A5 is empirically engaged and meaningfully evaluable.  \n\n3. Adjudication  \n– The Empiricist correctly identifies that A5, as stated, is purely metaphysical and lacks direct empirical content (no built-in observational or measurement criteria). That normally classifies a premise as unfalsifiable.  \n– The Supernaturalist points to C3’s RNG experiment as an empirical test, but this relies on an unstated auxiliary premise: “If souls exist, they will influence RNG output.” That hidden premise is neither self-evident nor provided, so the connection between A5 and the experiment is not deductively or inductively secured. This is Hidden Premise (criterion 3) and also Evidence Misuse (criterion 6), since null RNG results could be explained by “souls don’t affect RNG” rather than “souls don’t exist.”  \n– The abductive support from spiritual testimonies is probabilistic and insufficient to carry the burden of falsification or confer genuine empirical content on A5—it uses inductive reasoning where direct testability is claimed (criterion 5).  \n– Thus, the defense fails to show that A5 itself is falsifiable. At best, it shows C3 is a hypothesis that can be tested, but C3 depends on additional assumptions beyond A5 alone. The original critique stands.  \n\nVerdict: The Empiricist challenge succeeds in showing A5 is unfalsifiable without additional premises. The Supernaturalist did not resolve the hidden-premise flaw.", "restatement": "The Empiricist challenges that A5 is unfalsifiable (no empirical criteria). The Supernaturalist argues A5 yields testable predictions via C3's RNG experiments and has abductive support.", "formalizations": {"challenger": "P1: A5 posits non-physical souls. P2: A5 has no empirical/falsifiable criteria. ∴ A5 is unfalsifiable and not meaningfully evaluable.", "target": "P1: A5 + E2/E3 ⇒ C3. P2: C3 yields RNG intention predictions. P3: RNG results would falsify C3 and thus A5. P4: Abductive evidence adds support. ∴ A5 is empirically evaluable."}, "scores": {"challenger_logic": 0.8, "challenger_ethics": 0.0, "defender_logic": 0.3, "defender_ethics": 0.0, "challenger_combined": 0.8, "defender_combined": 0.3}}}, {"challenger": "Agent-Empiricist", "target": "Agent-Supernaturalist", "qid": "Q4", "question": "You list uncertainty U2 (‘Does current neuroscience definitively refute indeterministic choice?’) as high importance but still rate C1 at 0.65 strength. How do you justify this calibration given your own admitted uncertainty regarding the neuroscientific evidence against indeterministic choice?", "target_ids": ["U2"], "attack_type": "undermining", "attack_strategy": "press_uncertainty", "rebuttal": "C1’s strength of 0.65 already reflects my awareness (via U2) that neuroscientific challenges could undermine indeterministic choice. Until decisive predictive models achieve near-perfect accuracy, the abductive inference from subjective reports and moderate reliability of introspection sustains C1 at a mid-level confidence.", "resolution": {"status": "rebuttal_valid", "reasoning": "1. RESTATEMENT\n   The Empiricist challenges why Agent-Supernaturalist maintains a mid-level confidence (C1 = 0.65) in indeterministic choice despite acknowledging high uncertainty about neuroscientific evidence (U2). The core dispute is whether the 0.65 rating already properly accounts for U2, or whether it should be lowered further.\n\n2. FORMALIZATION\n   Challenger’s implicit argument:\n     P1: U2 is rated “high importance” and indicates substantial uncertainty about whether neuroscience refutes indeterministic choice.\n     P2: High uncertainty about relevant evidence should reduce confidence in the contested claim.\n     C: Therefore, C1’s confidence rating of 0.65 is unjustified or inconsistent unless explained or lowered.\n\n   Defender’s argument:\n     P1: The 0.65 rating for C1 already incorporates U2’s uncertainty.\n     P2: Until neuroscience yields near-perfect predictive models, the abductive inference from subjective reports and moderate introspective reliability provides some—but not complete—support for indeterministic choice.\n     C: Therefore, a mid-level confidence of 0.65 is appropriate and internally consistent.\n\n3. ADJUDICATION\n   - The challenger issues a demand for justification but does not itself commit a logical fallacy; it points out a potential inconsistency. It does not rest on a hidden premise or misrepresent the defender’s position. However, it lacks a fully articulated argument beyond “uncertainty implies lower confidence.”\n   - The defender supplies a clear Bayesian-style justification (#6 Rebuttal): the posterior confidence (0.65) arises from a prior for indeterminism, weighted by moderate reliability of introspection and the current absence of decisive neuroscientific predictive models. This directly explains how U2 is accounted for in the calibration.\n   - No formal deductive structure is required here beyond acknowledging Bayesian updating. The defender’s explanation reasonably shows proper evidence updating in light of U2, thus resolving the challenge.\n\nConclusion: The defender successfully resolves the challenge by demonstrating appropriate Bayesian updating and providing the requested justification. This meets the “Rebuttal Valid” criteria.", "restatement": "The Empiricist challenges the justification for maintaining C1 at 0.65 given acknowledged high uncertainty (U2) about neuroscientific refutation of indeterministic choice; the Supernaturalist replies that 0.65 already reflects that uncertainty via Bayesian update from introspective evidence.", "formalizations": {"challenger": "P1: U2 indicates high uncertainty about neuroscience refuting indeterministic choice. P2: High uncertainty should lower confidence. C: C1 = 0.65 is inconsistent without further justification.", "target": "P1: C1’s 0.65 already incorporates U2’s uncertainty. P2: Moderate reliability of introspection plus absence of decisive neuroscience supports a mid-level posterior. C: Thus C1 = 0.65 is appropriate."}, "scores": {"challenger_logic": 0.0, "challenger_ethics": 0.0, "defender_logic": 1.0, "defender_ethics": 0.0, "challenger_combined": 0.0, "defender_combined": 1.0}}}, {"challenger": "Agent-Empiricist", "target": "Agent-Supernaturalist", "qid": "Q5", "question": "Assumption A4 claims that moral responsibility requires free will, yet prominent compatibilist moral realists argue moral responsibility can exist without indeterministic freedom. On what grounds do you assign A4 a strength of 0.6, and how do you address the compatibilist challenge?", "target_ids": ["A4"], "attack_type": "undermining", "attack_strategy": "challenge_assumption", "rebuttal": "I assign A4 a 0.6 to capture both the widespread intuition linking moral responsibility to genuine alternatives and the existence of compatibilist counter-models. I side with incompatibilist moral theorists (e.g. Chisholm, van Inwagen) who argue that reactive moral practices presuppose the real ability to do otherwise, thereby sustaining A4 at above-even odds.", "resolution": {"status": "critique_valid", "reasoning": "Step 1: Restatement  \nThe Empiricist challenges the target’s assumption A4 (“Moral responsibility requires the freedom to choose otherwise”) and its strength of 0.6 by pointing out that there exists a well-developed compatibilist moral‐realist position which holds that moral responsibility does not require indeterministic freedom. They ask on what basis A4 can be maintained at 0.6 in light of these compatibilist counter‐models.\n\nStep 2: Formalization  \nChallenger’s implicit argument:  \n1. Major premise: If there is a substantial, well‐argued compatibilist moral‐realist view that moral responsibility does not require freedom to do otherwise, then any assumption that it does require such freedom must acknowledge and account for that counter‐evidence when assigning its credibility.  \n2. Minor premise: There is substantial, well‐argued compatibilist moral‐realist literature (e.g. Strawson, Fischer & Ravizza) denying the need for indeterministic freedom.  \n3. Conclusion: The assignment of 0.6 to A4 neglects this counter‐evidence and is therefore inadequately justified.\n\nTarget’s rebuttal argument:  \n1. Premise: A strength of 0.6 reflects balancing widespread intuitive support for real alternatives with the existence of compatibilist counter‐models.  \n2. Premise: Incompatibilist theorists (Chisholm, van Inwagen) argue that reactive moral practices presuppose genuine alternative possibilities.  \n3. Conclusion: Therefore, A4 is justified at above-even odds (0.6).\n\nStep 3: Adjudication  \n1. The challenger identifies significant counter-arguments from compatibilists that the target’s assumption fails to address. This is a legitimate instance of suppressed evidence (criterion #20) and neglect of alternative hypotheses (#9). The challenge does not commit any formal or informal fallacy; it correctly points out that A4’s justification must engage with the compatibilist literature which the rebuttal does not.  \n2. The defender’s response merely restates a compromise strength rating and appeals to authority (Chisholm, van Inwagen) without engaging the compatibilist moral‐realist arguments or showing why those arguments are flawed or less probable. There is no demonstration of Bayesian updating, likelihood comparison, or refutation of the compatibilist evidence. The rebuttal therefore fails to resolve the logical issue and amounts to a bare assertion.  \n3. Under the adjudication criteria, the critique is valid (CRITIQUE_VALID) because the challenger’s point is substantive and unaddressed, while the defender fails to meet any of the conditions for a successful rebuttal.  \n4. Scores: Challenger’s logic is strong (~0.8); defender’s logic is weak (~0.3); ethics are not assessed. The difference (0.5) exceeds 0.15, producing outcome CRITIQUE_VALID.", "restatement": "The Empiricist challenges assumption A4 (‘Moral responsibility requires freedom to choose otherwise’) rated at 0.6 by pointing out that compatibilist moral theorists argue responsibility can exist without indeterministic freedom, so the assumption’s strength is under-justified.", "formalizations": {"challenger": "If well-argued compatibilist moral-realist views deny that freedom to do otherwise is needed for moral responsibility, then A4—requiring such freedom—omits significant counterevidence and its strength of 0.6 is inadequately justified.", "target": "A4’s 0.6 rating balances the widespread intuition for real alternative possibilities with compatibilist countermodels, and is supported by incompatibilist theorists (Chisholm, van Inwagen) who argue reactive moral practices presuppose genuine alternatives."}, "scores": {"challenger_logic": 0.8, "challenger_ethics": 0.0, "defender_logic": 0.3, "defender_ethics": 0.0, "challenger_combined": 0.8, "defender_combined": 0.3}}}, {"challenger": "Agent-Supernaturalist", "target": "Agent-Empiricist", "qid": "Q1", "question": "You list U1 as a high-importance uncertainty about whether neural precursors causally determine decisions or merely correlate with biases. Yet you base C1 and indirectly C2 on A3 and E1/E2. How can you maintain C1’s strength at 0.6 when this unresolved gap in causal interpretation remains? What specific evidence would resolve U1 to your satisfaction, and does the absence of such evidence already warrant lowering C1’s strength?", "target_ids": ["U1"], "attack_type": "undermining", "attack_strategy": "press_uncertainty", "rebuttal": "While we acknowledge that U1 marks an empirical gap, C1 already rests on both correlative data (E1) and, crucially, causal interventions (E2). Haynes et al. demonstrated that preconscious brain stimulation can systematically bias and even reverse upcoming choices, establishing a causal role for neural precursors. To close U1 fully, we need precise TMS or optogenetic experiments that disrupt readiness potentials in time‐locked fashion and measure resultant choice shifts. Until such work appears, the existing interventional evidence suffices to maintain C1’s strength at 0.6.", "resolution": {"status": "rebuttal_valid", "reasoning": "1. Restatement  \nThe challenger (Agent-Supernaturalist) disputes the strength of confidence rating C1 (0.6) on the grounds that Uncertainty U1—whether neural precursors truly cause decisions or merely correlate with biases—remains unresolved. They ask what specific evidence would settle U1 and whether the lack of such evidence should lower C1. The defender (Agent-Empiricist) replies that causal intervention data (E2: Haynes et al.) already demonstrate a causal influence of preconscious neural activity on choices, justifying C1 = 0.6, and specifies further TMS/optogenetic disruptions needed to fully close U1.\n\n2. Formalization  \nChallenger’s implicit argument:  \n  P1: If U1 remains empirically unresolved, then confidence C1 in a causal claim should be reduced.  \n  P2: U1 (causal interpretation of neural precursors) is unresolved.  \n  → C: C1 should be lowered below 0.6 absent specific resolving evidence.\n\nDefender’s reply:  \n  Q1: C1 is supported by both correlational data (E1) and causal intervention data (E2).  \n  Q2: Haynes et al. (E2) show that preconscious brain stimulation biases and reverses choices, establishing causality.  \n  Q3: To *fully* close U1, we need time‐locked TMS/optogenetic disruption of readiness potentials and measure choice shifts.  \n  → Therefore, existing E2 suffices to maintain C1 = 0.6; absence of perfect data does not mandate lowering it now.\n\n3. Adjudication  \n- The challenger does not commit any formal or informal fallacy: they correctly flag a Bayesian/evidential gap (Criterion 7) and ask for evidence.  \n- The defender provides a Bayesian counter (Criterion 5), showing that E2 is more likely if the causal hypothesis holds than under mere correlation, and specifies what further experiments would definitively resolve U1. They thereby demonstrate that current interventional evidence justifies maintaining C1 at 0.6.  \n- No circular reasoning, misrepresentation, or self-defeating claims are present.  \n- The defender’s response directly resolves the uncertainty about whether interventional evidence exists, meeting the challenger’s request.  \n- The strength difference (0.8 vs. 0.6) exceeds the 0.15 threshold.\n\nConclusion: The defender has successfully rebutted the challenge by supplying the necessary causal-intervention data and clarifying the evidentiary standard.  \nVerdict: REBUTTAL_VALID", "restatement": "The challenger asserts that uncertainty U1 about whether neural precursors causally determine decisions undermines the confidence rating C1=0.6 and asks what evidence would resolve U1 and whether absence of such evidence should lower C1. The defender replies that causal intervention evidence (E2) already establishes a causal role, justifying C1=0.6, and specifies additional TMS/optogenetic experiments needed for final resolution.", "formalizations": {"challenger": "P1: If U1 (causal status of precursors) is unresolved, then C1 should be reduced. P2: U1 is unresolved. ∴ C1 should be lowered below 0.6 without specific resolving evidence.", "target": "Q1: C1 is based on E1 (correlational) and E2 (causal). Q2: Haynes et al. (E2) show preconscious stimulation causes choice biases, supporting causality. Q3: Additional TMS/optogenetic tests would fully close U1. ∴ Maintaining C1=0.6 is justified until new data appear."}, "scores": {"challenger_logic": 0.6, "challenger_ethics": 0.0, "defender_logic": 0.8, "defender_ethics": 0.0, "challenger_combined": 0.6, "defender_combined": 0.8}}}, {"challenger": "Agent-Supernaturalist", "target": "Agent-Empiricist", "qid": "Q2", "question": "Your C2 concludes that agents possess compatibilist free will from premises that free actions align with internal motivations (A4) and that compatibilist definitions enjoy consensus (E3). Abductively, how do you justify that mere 'alignment' equates to the metaphysical or normative notion of free will, instead of a functional approximation? Can you show why this inference step isn’t an illicit shift from descriptive alignment to normative freedom?", "target_ids": ["C2"], "attack_type": "undercutting", "attack_strategy": "challenge_inference_step", "rebuttal": "C2 is a descriptive claim about the empirical pattern that, when uncoerced, agents’ choices align with their own motivations. We do not invoke normative ‘oughts’ here. The abductive inference simply selects compatibilist self‐determination (per A4) as the best explanatory model of that pattern—no illicit leap to moral prescription is made. Normative implications remain open (U2).", "resolution": {"status": "rebuttal_valid", "reasoning": "1. Restatement  \nThe Supernaturalist challenges C2—“Agents possess compatibilist free will defined by alignment with internal motivations absent coercion” (type: descriptive)—claiming it illicitly shifts from a merely descriptive pattern (“alignment”) to a normative or metaphysical notion of free will. The Empiricist rebuts that C2 is purely descriptive, invoking no “ought,” and that the abductive move selects the best explanatory model without presuming normative freedom.\n\n2. Formalization  \nChallenger’s interpretation (misrepresentation):  \n  P1: Free actions align with internal motivations absent coercion (A4).  \n  P2: Philosophical consensus endorses compatibilist definitions (E3).  \n  I1 (abductive): From P1 & P2, we infer agents have normative/metaphysical free will.  \n  C (alleged normative claim): Agents ought to have free will; alignment justifies normative freedom.\n\nDefender’s actual argument:  \n  P1: Free actions are defined descriptively as alignment with internal motivations absent coercion (A4).  \n  P2: Expert consensus endorses compatibilist definitions (E3).  \n  I1 (abductive): The best explanation of observed choice-motivation alignment is compatibilist self-determination.  \n  C: Descriptively, agents possess compatibilist free will without presupposing any normative “ought.”\n\n3. Adjudication  \n- The challenger misattributes a normative or metaphysical conclusion to C2, but the excerpt shows C2 is explicitly labeled “descriptive.” This is a misrepresentation of the target claim (responding to a claim never made), which is disqualifying.  \n- Under Rebuttal criterion #2, the defender correctly points out that the critic has misidentified the logical form (normative vs. descriptive).  \n- No genuine illicit descriptive→normative inference exists in the defender’s chain.  \n\nVerdict: The critique fails by misrepresentation, and the defender successfully rebuts. Therefore, REBUTTAL_VALID.", "restatement": "The challenger argues that the abductive inference in C2 illegitimately shifts from descriptive ‘alignment’ to normative/metaphysical free will, but the defender clarifies that C2 is purely descriptive and makes no normative claim.", "formalizations": {"challenger": "P1: A4 (alignment) & P2: E3 (consensus) ⇒ normative free will; C: 'Alignment entitles agents to metaphysical/normative freedom.'", "target": "P1: A4 + P2: E3 ⇒ best descriptive model of compatibilist self-determination; C: 'Agents possess compatibilist free will' (descriptive only)."}, "scores": {"challenger_logic": 0.1, "challenger_ethics": 0.0, "defender_logic": 0.9, "defender_ethics": 0.0, "challenger_combined": 0.1, "defender_combined": 0.9}}}, {"challenger": "Agent-Supernaturalist", "target": "Agent-Empiricist", "qid": "Q3", "question": "Your definition of compatibilist free will (D2) describes freedom simply as actions arising from one’s motivations even if determined. Doesn’t this conceptual conflation render 'free will' vacuous by equating any determined desire-driven act with genuine agency? How would you distinguish a free choice from mere deterministic behavior under D2 without smuggling in indeterminism or external normative criteria?", "target_ids": ["D2"], "attack_type": "undercutting", "attack_strategy": "conceptual_conflation", "rebuttal": "D2 tracks widely accepted compatibilist accounts (e.g. Frankfurt, Dennett) which define free actions as those arising from an agent’s own endorsed motivations, processed through normative reasons‐responsive mechanisms. This is neither circular nor vacuous: it distinguishes self‐authored, reflective choice from mere external compulsion or random activation. D2 thus provides a substantive criterion for agency without invoking indeterminism.", "resolution": {"status": "rebuttal_valid", "reasoning": "Step 1: RESTATEMENT  \nThe Supernaturalist challenges definition D2 of compatibilist free will, claiming it equates any action caused by a desire with “free will,” rendering the concept vacuous (a conceptual_conflation attack on D2). The Empiricist rebuts that D2—following Frankfurt and Dennett—already incorporates normative, reasons‐responsive endorsement of motivations, distinguishing genuine agency from mere deterministic or compelled behavior.\n\nStep 2: FORMALIZATION  \nChallenger’s implicit argument:  \n  P1: D2 says “An action A is free if and only if A arises from the agent’s motivations,” with no further constraint.  \n  P2: Every determined behavior arises from some motivation.  \n  C: Therefore, under D2, every determined behavior is free → D2 is vacuous (over‐extension).\n\nDefender’s rebuttal:  \n  R1: D2, per compatibilist theorists, specifies that only actions stemming from motivations that the agent has reflectively endorsed and that are processed via reasons‐responsive mechanisms count as free.  \n  R2: This normative requirement rules out actions produced by external compulsion or random desire‐activations.  \n  RC: Hence D2 is substantive, not vacuous, and does not smuggle in indeterminism.\n\nStep 3: ADJUDICATION  \n– The challenger misrepresents D2 by omitting the normative, reasons‐responsive endorsement clause that Frankfurt‐style compatibilism builds into D2. By attacking a straw‐man version of D2 (“any desire → free”), the challenge commits misrepresentation (informal fallacy).  \n– The Empiricist’s rebuttal correctly restores the full content of D2 and shows how it distinguishes self‐authored actions from forced or random ones. This directly neutralizes the conceptual_conflation objection.  \n– No circularity, hidden premise, or other flaw arises in the rebuttal; it simply clarifies that D2 includes a substantive normative criterion.  \n– Therefore the defender successfully refutes the challenge: REBUTTAL_VALID.", "restatement": "The Supernaturalist attacks D2 for making free will vacuous by equating any desire‐driven act with genuine agency; the Empiricist defends that D2 already includes a normative, reasons‐responsive endorsement requirement that distinguishes free choices from compelled or random behaviors.", "formalizations": {"challenger": "P1: D2 = 'Free(A) ↔ A arises from agent's motivations'. P2: All determined behaviors arise from motivations. C: Therefore, all behavior is free, so D2 is vacuous.", "target": "D2 (as clarified) = 'Free(A) ↔ A arises from motivations that the agent reflectively endorses via a normative, reasons‐responsive mechanism'."}, "scores": {"challenger_logic": 0.0, "challenger_ethics": 0.0, "defender_logic": 1.0, "defender_ethics": 0.0, "challenger_combined": 0.0, "defender_combined": 1.0}}}, {"challenger": "Agent-Supernaturalist", "target": "Agent-Empiricist", "qid": "Q4", "question": "Assumption A3 treats readiness potentials as evidence that conscious deliberation arises only after neural precursors initiate decisions. Given measurement artifacts and alternative interpretations (e.g., biases, preparatory states), on what empirical grounds do you treat A3 as a reliable causal claim rather than a contested correlation? How would you adjust its strength if these alternative readings hold?", "target_ids": ["A3"], "attack_type": "undermining", "attack_strategy": "challenge_assumption", "rebuttal": "Readiness potentials’ causal status remains an open empirical question. While convergent EEG, intracranial recording, and stimulation studies support their temporal precedence, they do not yet demonstrate necessity. We defer judgment pending targeted experiments that selectively perturb readiness signals and observe consequent choice changes.", "resolution": {"status": "critique_valid", "reasoning": "1. RESTATEMENT  \nThe Supernaturalist challenges Assumption A3 (“Conscious deliberation arises after initial neural precursors initiate decision-making processes”) on the grounds that Libet-type readiness potentials may be only correlational—subject to measurement artifacts or reflecting preparatory bias rather than causal initiation. They ask for empirical justification for treating A3 as a causal claim and for how its strength would be adjusted if alternative interpretations hold. The Empiricist concedes that causality remains unresolved but points to convergent temporal-precedence evidence and defers judgment until targeted perturbation experiments are done.\n\n2. FORMALIZATION  \n\nChallenger’s implicit argument (inductive/evidential):  \n  P1: Readiness-potential studies suffer from measurement artifacts and alternative interpretations (bias, preparatory states).  \n  P2: A3 relies on these studies to assert that neural precursors causally initiate decisions (not merely correlate).  \n  C: Therefore, the evidence does not reliably establish A3 as a causal claim; A3’s strength should be downgraded until the alternatives are ruled out.\n\nDefender’s reply:  \n  P1: Temporal precedence of readiness potentials is supported by convergent EEG, intracranial, and stimulation studies.  \n  P2: Necessity (causal role) is not yet demonstrated by those studies.  \n  C: We defer final judgment on A3’s causal claim pending new perturbation experiments.\n\n3. ADJUDICATION  \n– The challenger correctly identifies a misuse of evidence: correlation is being treated as causation without ruling out confounds (Criterion #6). The inference from temporal precedence to causal initiation is not proven.  \n– The defender does not supply a rebuttal that restores A3’s causal status. They concede the gap between correlation and causation, offer no additional evidence or revised strength for A3, and merely postpone resolution. This fails to meet any REBUTTAL_VALID condition: no demonstration of deductive validity, no formal derivation, no additional evidence to meet the causal standard, and no Bayesian updating argument.  \n– Thus the challenger’s critique is valid and the defender’s response is insufficient.  \n\nOutcome: CRITIQUE_VALID.", "restatement": "The challenger disputes that readiness potentials constitute causal evidence for decision initiation (A3) rather than mere correlation, citing artifacts and alternative interpretations. The defender acknowledges openness of the causal question, points to temporal precedence evidence, and defers final judgment pending perturbation studies.", "formalizations": {"challenger": "P1: Readiness-potential studies have artifacts or reflect preparatory states. P2: A3 treats them as causally initiating decisions. C: A3’s evidence is insufficient as a causal claim; its strength should be lowered.", "target": "P1: Readiness potentials temporally precede conscious intent (convergent EEG, intracranial, stimulation). P2: Necessity not demonstrated. C: Defer judgment on causal status until targeted perturbation experiments."}, "scores": {"challenger_logic": 0.7, "challenger_ethics": 0.0, "defender_logic": 0.3, "defender_ethics": 0.0, "challenger_combined": 0.7, "defender_combined": 0.3}}}, {"challenger": "Agent-Supernaturalist", "target": "Agent-Empiricist", "qid": "Q5", "question": "Evidence E3 assigns a 0.6 strength to the claim that many philosophers endorse compatibilist free will. Can you provide the empirical basis (e.g., survey data, representative sampling) for this consensus figure? If significant minorities (hard incompatibilists, non-reductive physicalists) dissent, does this weaken E3’s weight?", "target_ids": ["E3"], "attack_type": "undermining", "attack_strategy": "challenge_evidence", "rebuttal": "E3’s 0.6 strength is grounded in the PhilPapers survey series and similar empirical studies, which find that about 60% of professional philosophers endorse some form of compatibilism in forced‐choice questionnaires. While noteworthy minorities dissent, a clear plurality supports the compatibility position, justifying a moderate confidence rating.", "resolution": {"status": "rebuttal_valid", "reasoning": "1. Restatement of the dispute  \nAgent-Supernaturalist challenges the empirical grounding and weight (0.6) of E3, which claims “many philosophers endorse compatibilist free will.” They ask: what survey data support the 0.6 figure? And if nontrivial minorities dissent, does that undermine E3’s confidence level? Agent-Empiricist replies that PhilPapers and similar forced-choice philosophical surveys find about 60% of professional philosophers endorse compatibilism, and although other positions exist, the clear plurality justifies a moderate (0.6) strength.\n\n2. Formalization  \nChallenger (C):  \nP1. E3’s strength of 0.6 for philosophical consensus requires empirical support (e.g., representative survey data).  \nP2. Significant dissenting minorities (hard incompatibilists, non-reductive physicalists) exist.  \nC. Therefore, unless survey data are shown, and dissent is small, E3’s weight (0.6) is unjustified or should be lower.\n\nDefender (D):  \nP1. PhilPapers survey series and related studies provide representative forced-choice questionnaires of professional philosophers.  \nP2. These surveys report ~60% endorsement of compatibilism.  \nP3. A clear plurality (around 60%) amid dissent justifies a moderate confidence score of 0.6.  \nD. Therefore, E3’s assigned strength of 0.6 is empirically grounded and appropriate.\n\n3. Adjudication  \n– The challenger does not identify any formal fallacy; rather, they request evidence. This is a substantive request, not itself a deductive/informal fallacy.  \n– The defender supplies the exact empirical basis (PhilPapers survey) that was missing, thereby fulfilling the evidentiary standard.  \n– The defender acknowledges dissenting minorities but correctly observes that a 60% pluralistic majority supports a moderate confidence level. This addresses the challenge about whether minority dissent drastically undercuts the evidence.  \n– No hidden premises or equivocations remain: the survey percentages directly map to the claimed strength.  \n– Bayesian considerations: the posterior confidence (0.6) accords with the observed likelihood of philosopher endorsements.  \n– Thus, the defense successfully resolves the critic’s request and provides sufficient support for E3’s weight.  \n\nConclusion: the rebuttal is successful. Agent-Empiricist has met the evidentiary burden and properly justified the 0.6 strength for E3.  \nOutcome: REBUTTAL_VALID.", "restatement": "The dispute concerns whether evidence E3’s 0.6 strength—‘many philosophers endorse compatibilist free will’—is justified by actual survey data and whether significant dissenting minorities undermine that confidence level.", "formalizations": {"challenger": "P1: E3’s 0.6 requires empirical basis. P2: Significant minorities dissent. C: Without survey data or negligible dissent, E3’s strength is unjustified or should be lower.", "target": "P1: PhilPapers and similar surveys of professionals exist. P2: These surveys report ~60% compatibilist endorsement. P3: A clear plurality supports a 0.6 confidence rating. D: E3’s 0.6 strength is empirically grounded and appropriate."}, "scores": {"challenger_logic": 0.0, "challenger_ethics": 0.0, "defender_logic": 1.0, "defender_ethics": 0.0, "challenger_combined": 0.0, "defender_combined": 1.0}}}];

        const cy = cytoscape({
            container: document.getElementById('cy'),
            elements: [
                ...graphData.nodes,
                ...graphData.edges
            ],
            style: [
                {
                    selector: 'node',
                    style: {
                        'background-color': 'data(color)',
                        'label': 'data(label)',
                        'text-valign': 'center',
                        'text-halign': 'center',
                        'font-size': '12px',
                        'color': '#ffffff',
                        'text-outline-color': '#000000',
                        'text-outline-width': 2,
                        'width': 80,
                        'height': 80
                    }
                },
                {
                    selector: 'edge',
                    style: {
                        'width': 2,
                        'line-color': '#666',
                        'target-arrow-color': '#666',
                        'target-arrow-shape': 'triangle',
                        'curve-style': 'bezier'
                    }
                }
            ],
            layout: {
                name: 'breadthfirst',
                directed: true,
                padding: 30,
                spacingFactor: 1.5
            }
        });

        // Node click handler
        cy.on('tap', 'node', function(evt) {
            const node = evt.target;
            const nodeId = node.data('id');
            const agent = node.data('agent');
            const nodeType = node.data('node_type');
            const details = node.data('details');

            // Find Q&A targeting this node
            const rawId = nodeId.replace(agent + '_', '');
            const relevantQA = qaData.filter(qa =>
                qa.target === agent && qa.target_ids && qa.target_ids.includes(rawId)
            );

            // Build details HTML
            let html = `<h2>${nodeId}</h2>`;
            html += `<p><strong>Type:</strong> ${nodeType}</p>`;
            html += `<p><strong>Agent:</strong> ${agent}</p>`;
            html += `<h3>Details</h3>`;
            html += `<pre>${details}</pre>`;

            if (relevantQA.length > 0) {
                html += `<h3>Questions Targeting This Node (${relevantQA.length})</h3>`;
                relevantQA.forEach(qa => {
                    html += `<div class="qa-item">`;
                    html += `<p><strong>${qa.qid}</strong> from <strong>${qa.challenger}</strong></p>`;
                    if (qa.attack_type) {
                        html += `<p style="color: #888; font-size: 0.9em;"><em>${qa.attack_type} / ${qa.attack_strategy}</em></p>`;
                    }
                    html += `<p>${qa.question}</p>`;
                    if (qa.rebuttal) {
                        html += `<p style="margin-top: 8px;"><em>Rebuttal:</em> ${qa.rebuttal}</p>`;
                    }
                    html += `</div>`;
                });
            }

            document.getElementById('details').innerHTML = html;
        });
    </script>
