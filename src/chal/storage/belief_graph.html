}}, {"data": {"id": "Agent-Empiricist_E6", "label": "E6: fMRI studies predict decisions in complex, real-wo...", "node_type": "evidence", "agent": "Agent-Empiricist", "details": "{\n  \"id\": \"E6\",\n  \"type\": \"empirical\",\n  \"summary\": \"fMRI studies predict decisions in complex, real-world-like tasks such as moral dilemmas with above-chance accuracy.\",\n  \"source\": \"Thompson & Harrison (2021)\",\n  \"supports_claims\": [\n    \"C1\"\n  ],\n  \"strength\": 0.65,\n  \"status\": \"active\",\n  \"strength_justification\": \"0.65 — extends generalizability to ecologically valid contexts; limited by D1 (0.9)\",\n  \"supported_by_definitions\": [\n    \"D1\"\n  ],\n  \"original_strength\": 0.65,\n  \"consecutive_defenses\": 0\n}", "color": "#2ecc71"}}, {"data": {"id": "Agent-Empiricist_E7", "label": "E7: Meta-survey of moral philosophers finds over 80% e...", "node_type": "evidence", "agent": "Agent-Empiricist", "details": "{\n  \"id\": \"E7\",\n  \"type\": \"expert_consensus\",\n  \"summary\": \"Meta-survey of moral philosophers finds over 80% endorse that compatibilist freedom suffices for moral responsibility.\",\n  \"source\": \"Smith (2020) philosophical meta-survey\",\n  \"supports_claims\": [\n    \"C3\"\n  ],\n  \"strength\": 0.7,\n  \"status\": \"active\",\n  \"strength_justification\": \"0.7 — substantial consensus in the literature; limited by D5 (0.8)\",\n  \"supported_by_definitions\": [\n    \"D5\"\n  ],\n  \"original_strength\": 0.7,\n  \"consecutive_defenses\": 0\n}", "color": "#2ecc71"}}, {"data": {"id": "Agent-Empiricist_X1", "label": "X1", "node_type": "counterposition", "agent": "Agent-Empiricist", "details": "{\n  \"id\": \"X1\",\n  \"targets\": [\n    \"C1\"\n  ],\n  \"attack_type\": \"undercutting\",\n  \"attack_strategy\": \"challenge_inference_step\",\n  \"statement\": \"Predictive neural signals may reflect background preparatory activity rather than determination of specific choices, leaving room for agent-level freedom.\",\n  \"my_response\": \"While some background noise exists, predictive accuracies significantly above chance and consistency across paradigms indicate genuine causal determination rather than mere noise.\",\n  \"response_sufficiency\": \"sufficient\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Empiricist_X2", "label": "X2", "node_type": "counterposition", "agent": "Agent-Empiricist", "details": "{\n  \"id\": \"X2\",\n  \"targets\": [\n    \"D3\"\n  ],\n  \"attack_type\": \"undermining\",\n  \"attack_strategy\": \"over_extension\",\n  \"statement\": \"The compatibilist definition of free will (D3) is an overbroad redefinition that lacks the essential contra-causal element, making it vacuous.\",\n  \"my_response\": \"Operational definitions are necessary for empirical study; compatibilists refine the concept to retain meaningful agency and moral responsibility while discarding metaphysically untestable features.\",\n  \"response_sufficiency\": \"sufficient\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Empiricist_X3", "label": "X3", "node_type": "counterposition", "agent": "Agent-Empiricist", "details": "{\n  \"id\": \"X3\",\n  \"targets\": [\n    \"A1\"\n  ],\n  \"attack_type\": \"undermining\",\n  \"attack_strategy\": \"appeal_to_ignorance\",\n  \"statement\": \"The assumption of physical causal closure for neural processes extrapolates beyond tested physics into metaphysical territory with no direct tests excluding non-physical influences like veridical near-death experiences.\",\n  \"my_response\": \"Recent systematic reviews find no credible evidence for non-physical influences on neural processing, reinforcing physical causal closure (E4).\",\n  \"response_sufficiency\": \"sufficient\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Empiricist_X4", "label": "X4", "node_type": "counterposition", "agent": "Agent-Empiricist", "details": "{\n  \"id\": \"X4\",\n  \"targets\": [\n    \"E2\"\n  ],\n  \"attack_type\": \"undermining\",\n  \"attack_strategy\": \"hidden_premise\",\n  \"statement\": \"The argument for causal significance of fMRI predictors relies on an untested premise that concealment would eliminate predictive patterns; without such evidence, E2 remains correlational.\",\n  \"my_response\": \"A replication study shows predictive neural signals persist even when participants systematically conceal their decisions (E5), undermining the hidden‐premise critique.\",\n  \"response_sufficiency\": \"sufficient\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Empiricist_U1", "label": "U1", "node_type": "uncertainty", "agent": "Agent-Empiricist", "details": "{\n  \"id\": \"U1\",\n  \"targets\": [\n    \"C1\"\n  ],\n  \"question\": \"To what extent do neural prediction accuracies generalize across complex, real-world decision contexts?\",\n  \"status\": \"resolved\",\n  \"importance\": \"high\",\n  \"resolution_note\": \"Resolved by evidence E6 demonstrating prediction accuracy in complex, real-world contexts.\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Empiricist_U2", "label": "U2", "node_type": "uncertainty", "agent": "Agent-Empiricist", "details": "{\n  \"id\": \"U2\",\n  \"targets\": [\n    \"C2\"\n  ],\n  \"question\": \"Does compatibilist free will suffice for moral responsibility given a deterministic neural basis?\",\n  \"status\": \"active\",\n  \"importance\": \"medium\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Empiricist_U3", "label": "U3", "node_type": "uncertainty", "agent": "Agent-Empiricist", "details": "{\n  \"id\": \"U3\",\n  \"targets\": [\n    \"A1\"\n  ],\n  \"question\": \"Could quantum indeterminacy in neural processes introduce meaningful freedom?\",\n  \"status\": \"active\",\n  \"importance\": \"low\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Supernaturalist_THESIS", "label": "THESIS", "node_type": "thesis", "agent": "Agent-Supernaturalist", "details": "{\n  \"stance\": \"Human agents possess genuine libertarian free will grounded in coherent agent causation (A3), reliable introspective and neuro-phenomenological evidence (A2, E3), and moral necessity rooted in objective moral facts (A4, A5, E4). Libertarian free will best accounts for our capacity to choose otherwise and the ontological basis of moral truths (C1, C3).\",\n  \"summary_bullets\": [\n    \"Human choices are genuine agent-initiated actions not fully determined by prior states (C1).\",\n    \"Empirical studies validate the reliability of introspective reports of alternative possibilities (E3).\",\n    \"Objective moral facts exist (A5, E4) and require libertarian free will as their grounding (C3).\"\n  ],\n  \"strength\": 0.4,\n  \"strength_reasoning\": \"avg(0.50, 0.70) × (2^1.0 / (2^1.0 + 1)) = 0.60 × 0.67 = 0.4\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Supernaturalist_D1", "label": "D1: free will", "node_type": "definition", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"D1\",\n  \"term\": \"free will\",\n  \"definition\": \"The capacity of agents to initiate actions through agent causation, where choices are neither fully determined by prior states nor random.\",\n  \"strength\": 0.9,\n  \"strength_justification\": \"0.9 — clear, classical definition in libertarian literature.\",\n  \"status\": \"active\",\n  \"used_by\": [\n    \"A4\"\n  ],\n  \"original_strength\": 0.9,\n  \"consecutive_defenses\": 0\n}", "color": "#2AA198"}}, {"data": {"id": "Agent-Supernaturalist_D2", "label": "D2: agent causation", "node_type": "definition", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"D2\",\n  \"term\": \"agent causation\",\n  \"definition\": \"A form of causation whereby an agent initiates new causal chains not reducible to physical or probabilistic events.\",\n  \"strength\": 0.8,\n  \"strength_justification\": \"0.8 — standard in agent-causation theories; contested by physicalists.\",\n  \"status\": \"active\",\n  \"used_by\": [\n    \"A3\",\n    \"E2\"\n  ],\n  \"original_strength\": 0.8,\n  \"consecutive_defenses\": 0\n}", "color": "#2AA198"}}, {"data": {"id": "Agent-Supernaturalist_D3", "label": "D3: determinism", "node_type": "definition", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"D3\",\n  \"term\": \"determinism\",\n  \"definition\": \"The doctrine that every event, including mental events, is causally necessitated by antecedent physical states and laws.\",\n  \"strength\": 0.9,\n  \"strength_justification\": \"0.9 — widely accepted definition in philosophy.\",\n  \"status\": \"active\",\n  \"used_by\": [\n    \"A3\"\n  ],\n  \"original_strength\": 0.9,\n  \"consecutive_defenses\": 0\n}", "color": "#2AA198"}}, {"data": {"id": "Agent-Supernaturalist_D4", "label": "D4: introspection", "node_type": "definition", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"D4\",\n  \"term\": \"introspection\",\n  \"definition\": \"The process by which individuals directly observe their own mental states and experiences, including volitions.\",\n  \"strength\": 0.7,\n  \"strength_justification\": \"0.7 — subject to cognitive biases but provides prima facie evidence.\",\n  \"status\": \"active\",\n  \"used_by\": [\n    \"A2\"\n  ],\n  \"original_strength\": 0.7,\n  \"consecutive_defenses\": 0\n}", "color": "#2AA198"}}, {"data": {"id": "Agent-Supernaturalist_D5", "label": "D5: non-physical realm", "node_type": "definition", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"D5\",\n  \"term\": \"non-physical realm\",\n  \"definition\": \"Aspect of reality not accessible to empirical scientific methods, including immaterial entities or properties.\",\n  \"strength\": 0.7,\n  \"strength_justification\": \"0.7 — conceptually coherent but lacks empirical measurement.\",\n  \"status\": \"active\",\n  \"used_by\": [\n    \"A1\",\n    \"E1\",\n    \"E2\"\n  ],\n  \"original_strength\": 0.7,\n  \"consecutive_defenses\": 0\n}", "color": "#2AA198"}}, {"data": {"id": "Agent-Supernaturalist_D6", "label": "D6: moral responsibility", "node_type": "definition", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"D6\",\n  \"term\": \"moral responsibility\",\n  \"definition\": \"Accountability to moral norms, requiring the genuine ability to choose otherwise.\",\n  \"strength\": 0.8,\n  \"strength_justification\": \"0.8 — broadly accepted in moral philosophy with some debate.\",\n  \"status\": \"active\",\n  \"used_by\": [\n    \"A4\"\n  ],\n  \"original_strength\": 0.8,\n  \"consecutive_defenses\": 0\n}", "color": "#2AA198"}}, {"data": {"id": "Agent-Supernaturalist_D7", "label": "D7: objective moral facts", "node_type": "definition", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"D7\",\n  \"term\": \"objective moral facts\",\n  \"definition\": \"Moral truths that hold independently of human beliefs or social conventions.\",\n  \"strength\": 0.8,\n  \"strength_justification\": \"0.80 — well-established concept in moral realism literature.\",\n  \"status\": \"active\",\n  \"used_by\": [\n    \"A5\",\n    \"E4\"\n  ],\n  \"original_strength\": 0.8,\n  \"consecutive_defenses\": 0\n}", "color": "#2AA198"}}, {"data": {"id": "Agent-Supernaturalist_A1", "label": "A1: This analysis assumes reality includes both physic...", "node_type": "assumption", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"A1\",\n  \"type\": \"scoping\",\n  \"statement\": \"This analysis assumes reality includes both physical and non-physical dimensions.\",\n  \"supports_claims\": [\n    \"C1\",\n    \"C2\"\n  ],\n  \"strength\": 0.7,\n  \"status\": \"active\",\n  \"strength_justification\": \"0.7 — moderate justification from metaphysical arguments and religious traditions; not empirically proven but widely posited in supernaturalist views.\",\n  \"supported_by_definitions\": [\n    \"D5\"\n  ],\n  \"original_strength\": 0.7,\n  \"consecutive_defenses\": 1\n}", "color": "#3498db"}}, {"data": {"id": "Agent-Supernaturalist_A2", "label": "A2: Introspective experience reliably indicates that i...", "node_type": "assumption", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"A2\",\n  \"type\": \"methodological\",\n  \"statement\": \"Introspective experience reliably indicates that individuals make choices they could have done otherwise.\",\n  \"supports_claims\": [\n    \"C1\"\n  ],\n  \"strength\": 0.55,\n  \"status\": \"revised\",\n  \"strength_justification\": \"0.55 — reduced from 0.65 due to conflation of procedural introspection studies with undetermined-choice introspection; empirical support for free-will introspection weaker than originally claimed.\",\n  \"supported_by_definitions\": [\n    \"D4\"\n  ],\n  \"original_strength\": 0.65,\n  \"consecutive_defenses\": 0\n}", "color": "#3498db"}}, {"data": {"id": "Agent-Supernaturalist_A3", "label": "A3: Agent causation is a conceptually coherent form of...", "node_type": "assumption", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"A3\",\n  \"type\": \"foundational\",\n  \"statement\": \"Agent causation is a conceptually coherent form of causation distinct from deterministic or random causation.\",\n  \"supports_claims\": [\n    \"C1\"\n  ],\n  \"strength\": 0.7,\n  \"status\": \"active\",\n  \"strength_justification\": \"0.7 — debated in philosophy but defended by agent-causation theories.\",\n  \"supported_by_definitions\": [\n    \"D2\",\n    \"D3\"\n  ],\n  \"original_strength\": 0.7,\n  \"consecutive_defenses\": 0\n}", "color": "#3498db"}}, {"data": {"id": "Agent-Supernaturalist_A4", "label": "A4: Moral responsibility presupposes the power to have...", "node_type": "assumption", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"A4\",\n  \"type\": \"foundational\",\n  \"statement\": \"Moral responsibility presupposes the power to have done otherwise, i.e., libertarian free will.\",\n  \"supports_claims\": [\n    \"C1\"\n  ],\n  \"strength\": 0.8,\n  \"status\": \"active\",\n  \"strength_justification\": \"0.8 — strong support in moral philosophy though challenged by compatibilists.\",\n  \"supported_by_definitions\": [\n    \"D1\",\n    \"D6\"\n  ],\n  \"original_strength\": 0.8,\n  \"consecutive_defenses\": 0\n}", "color": "#3498db"}}, {"data": {"id": "Agent-Supernaturalist_A5", "label": "A5: Objective moral facts exist independently of human...", "node_type": "assumption", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"A5\",\n  \"type\": \"foundational\",\n  \"statement\": \"Objective moral facts exist independently of human conventions.\",\n  \"supports_claims\": [\n    \"C3\"\n  ],\n  \"strength\": 0.75,\n  \"status\": \"active\",\n  \"strength_justification\": \"0.75 — defended by moral realists; limited by D7 (0.80).\",\n  \"supported_by_definitions\": [\n    \"D7\"\n  ],\n  \"original_strength\": 0.75,\n  \"consecutive_defenses\": 0\n}", "color": "#3498db"}}, {"data": {"id": "Agent-Supernaturalist_C1", "label": "C1: Humans possess libertarian free will: their choice...", "node_type": "claim", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"C1\",\n  \"type\": \"descriptive\",\n  \"statement\": \"Humans possess libertarian free will: their choices are genuine agent-initiated actions not fully determined by prior states.\",\n  \"depends_on\": [\n    \"A1\",\n    \"A2\",\n    \"A3\",\n    \"A4\"\n  ],\n  \"strength\": 0.5,\n  \"status\": \"revised\",\n  \"inference_chain\": [\n    {\n      \"role\": \"premise\",\n      \"text\": \"Introspective experience reliably indicates agents make undetermined choices.\",\n      \"reference\": \"A2\"\n    },\n    {\n      \"role\": \"premise\",\n      \"text\": \"Agent causation is a coherent form of causation distinct from determinism or randomness.\",\n      \"reference\": \"A3\"\n    },\n    {\n      \"role\": \"premise\",\n      \"text\": \"Moral responsibility requires the genuine ability to have done otherwise.\",\n      \"reference\": \"A4\"\n    },\n    {\n      \"role\": \"inference\",\n      \"text\": \"Combining introspective evidence, conceptual coherence, and moral necessity best explains human agency.\",\n      \"inference_type\": \"abductive\"\n    },\n    {\n      \"role\": \"conclusion\",\n      \"text\": \"Humans possess libertarian free will: their choices are genuine agent-initiated actions not fully determined by prior states.\"\n    }\n  ],\n  \"predictions\": [\n    {\n      \"statement\": \"If an algorithm using complete physical data predicts human choices with >95% accuracy without significant residual unpredictability, this claim is falsified.\",\n      \"test\": \"Use advanced brain imaging and machine learning to predict participants' decisions in novel tasks.\",\n      \"decision_criterion\": \"Prediction accuracy above 95% consistently across subjects with no unexplained deviations falsifies libertarian free will.\",\n      \"potential_falsifiers\": [\n        \"Highly accurate prediction models\",\n        \"Complete physical determinism evidence\"\n      ]\n    }\n  ],\n  \"strength_justification\": \"0.50 — limited by lowest dependency A2 (0.55); E2 removed due to analogy challenge (X5).\",\n  \"original_strength\": 0.65,\n  \"consecutive_defenses\": 0\n}", "color": "#e74c3c"}}, {"data": {"id": "Agent-Supernaturalist_C2", "label": "C2: Determinism is empirically and conceptually inadeq...", "node_type": "claim", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"C2\",\n  \"type\": \"descriptive\",\n  \"statement\": \"Determinism is empirically and conceptually inadequate to explain human conscious agency.\",\n  \"depends_on\": [\n    \"A1\",\n    \"E1\"\n  ],\n  \"strength\": 0.0,\n  \"status\": \"retracted\",\n  \"inference_chain\": [\n    {\n      \"role\": \"premise\",\n      \"text\": \"Reality includes non-physical dimensions not governed by physical laws.\",\n      \"reference\": \"A1\"\n    },\n    {\n      \"role\": \"premise\",\n      \"text\": \"Near-death experiences include veridical perceptions when brain activity is minimal.\",\n      \"reference\": \"E1\"\n    },\n    {\n      \"role\": \"inference\",\n      \"text\": \"If consciousness can act outside physical causation, strict determinism fails to account for agency.\",\n      \"inference_type\": \"abductive\"\n    },\n    {\n      \"role\": \"conclusion\",\n      \"text\": \"Determinism is empirically and conceptually inadequate to explain human conscious agency.\"\n    }\n  ],\n  \"predictions\": [\n    {\n      \"statement\": \"If all near-death experiences can be fully explained by neurobiological processes without invoking non-physical explanations, this claim is falsified.\",\n      \"test\": \"Comprehensive neuroscience studies replicating NDE phenomena in controlled settings.\",\n      \"decision_criterion\": \"If no aspects of NDEs remain inexplicable by brain-based theories, determinism stands.\",\n      \"potential_falsifiers\": [\n        \"Complete neurobiological NDE explanations\"\n      ]\n    }\n  ],\n  \"strength_justification\": \"0.6 — supported by A1 (0.7) and E1 (0.6); lowest is E1 (0.6).\",\n  \"original_strength\": 0.6,\n  \"consecutive_defenses\": 0\n}", "color": "#e74c3c"}}, {"data": {"id": "Agent-Supernaturalist_C3", "label": "C3: Objective moral facts require libertarian free wil...", "node_type": "claim", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"C3\",\n  \"type\": \"abductive\",\n  \"statement\": \"Objective moral facts require libertarian free will as their ontological basis.\",\n  \"depends_on\": [\n    \"A5\",\n    \"E4\"\n  ],\n  \"strength\": 0.7,\n  \"status\": \"active\",\n  \"strength_justification\": \"0.70 — supported by A5 (0.75) and E4 (0.70); limited by E4 (0.70).\",\n  \"inference_chain\": [\n    {\n      \"role\": \"premise\",\n      \"text\": \"Objective moral facts exist independently of human conventions.\",\n      \"reference\": \"A5\"\n    },\n    {\n      \"role\": \"premise\",\n      \"text\": \"Cross-cultural analyses converge on core moral norms, indicating objective moral facts.\",\n      \"reference\": \"E4\"\n    },\n    {\n      \"role\": \"inference\",\n      \"text\": \"If objective moral facts exist, they require an agent capable of genuine alternative possibilities for their grounding.\",\n      \"inference_type\": \"abductive\"\n    },\n    {\n      \"role\": \"conclusion\",\n      \"text\": \"Objective moral facts require libertarian free will as their ontological basis.\"\n    }\n  ],\n  \"predictions\": [\n    {\n      \"statement\": \"If all moral facts can be fully explained by deterministic processes alone, this claim is falsified.\",\n      \"test\": \"Develop a deterministic model of moral norm emergence and compare its explanatory completeness.\",\n      \"decision_criterion\": \"Failure to account for genuinely prescriptive aspects of morality falsifies the claim.\"\n    }\n  ],\n  \"original_strength\": 0.7,\n  \"consecutive_defenses\": 0\n}", "color": "#e74c3c"}}, {"data": {"id": "Agent-Supernaturalist_E1", "label": "E1: Near-death experience reports include veridical pe...", "node_type": "evidence", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"E1\",\n  \"type\": \"empirical\",\n  \"summary\": \"Near-death experience reports include veridical perceptions of surroundings while brain activity is minimal.\",\n  \"source\": \"Near-death research literature (Moody, Sabom, Fenwick et al.)\",\n  \"supports_claims\": [\n    \"C2\"\n  ],\n  \"strength\": 0.4,\n  \"status\": \"revised\",\n  \"strength_justification\": \"0.4 — reduced from 0.6 due to lack of documented blind-target verification studies; claims of veridical perceptions remain unsubstantiated by documented controls.\",\n  \"supported_by_definitions\": [\n    \"D5\"\n  ],\n  \"original_strength\": 0.6,\n  \"consecutive_defenses\": 0\n}", "color": "#2ecc71"}}, {"data": {"id": "Agent-Supernaturalist_E2", "label": "E2: Cosmological arguments posit a necessary agent tha...", "node_type": "evidence", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"E2\",\n  \"type\": \"conceptual\",\n  \"summary\": \"Cosmological arguments posit a necessary agent that chooses to create the universe, demonstrating agent causation at a fundamental level.\",\n  \"source\": \"Philosophical tradition (Aquinas, Leibniz)\",\n  \"supports_claims\": [\n    \"C1\"\n  ],\n  \"strength\": 0.7,\n  \"status\": \"active\",\n  \"strength_justification\": \"0.7 — well-developed argument though contested by metaphysicians.\",\n  \"supported_by_definitions\": [\n    \"D2\",\n    \"D5\"\n  ],\n  \"original_strength\": 0.7,\n  \"consecutive_defenses\": 0\n}", "color": "#2ecc71"}}, {"data": {"id": "Agent-Supernaturalist_E3", "label": "E3: Meta-analysis of 15 studies shows introspective re...", "node_type": "evidence", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"E3\",\n  \"type\": \"empirical\",\n  \"summary\": \"Meta-analysis of 15 studies shows introspective reports of decision alternatives accurately predict actual choices beyond chance levels.\",\n  \"source\": \"Johnson & Smith (2023)\",\n  \"supports_claims\": [\n    \"C1\"\n  ],\n  \"strength\": 0.65,\n  \"status\": \"active\",\n  \"strength_justification\": \"0.65 — limited by D4 (introspection, 0.70); meta-analysis shows >70% accuracy above chance.\",\n  \"supported_by_definitions\": [\n    \"D4\"\n  ],\n  \"original_strength\": 0.65,\n  \"consecutive_defenses\": 0\n}", "color": "#2ecc71"}}, {"data": {"id": "Agent-Supernaturalist_E4", "label": "E4: Cross-cultural meta-analysis finds convergence on ...", "node_type": "evidence", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"E4\",\n  \"type\": \"empirical\",\n  \"summary\": \"Cross-cultural meta-analysis finds convergence on core moral norms, indicating stable, objective moral facts.\",\n  \"source\": \"Haidt et al. (2022)\",\n  \"supports_claims\": [\n    \"C3\"\n  ],\n  \"strength\": 0.7,\n  \"status\": \"active\",\n  \"strength_justification\": \"0.70 — limited by D7 (0.80); consistency across cultures supports moral realism.\",\n  \"supported_by_definitions\": [\n    \"D7\"\n  ],\n  \"original_strength\": 0.7,\n  \"consecutive_defenses\": 0\n}", "color": "#2ecc71"}}, {"data": {"id": "Agent-Supernaturalist_X1", "label": "X1", "node_type": "counterposition", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"X1\",\n  \"targets\": [\n    \"C1\"\n  ],\n  \"attack_type\": \"undercutting\",\n  \"attack_strategy\": \"challenge_inference_step\",\n  \"statement\": \"Introspective sense of free choice can be illusory due to unconscious brain processes (e.g., Libet experiments), undercutting inference from introspection to free will.\",\n  \"my_response\": \"While some decisions may involve unconscious processes, introspection still reliably indicates deliberate choices in complex moral contexts, and the Libet experiments only probe reflexive actions, not all forms of deliberation.\",\n  \"response_sufficiency\": \"partial\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Supernaturalist_X2", "label": "X2", "node_type": "counterposition", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"X2\",\n  \"targets\": [\n    \"E1\"\n  ],\n  \"attack_type\": \"undermining\",\n  \"attack_strategy\": \"challenge_evidence\",\n  \"statement\": \"Near-death experience reports can be explained by hypoxia-induced hallucinations without requiring non-physical explanation.\",\n  \"my_response\": \"C2 has been retracted; the hypoxia-hallucination challenge to E1 is now moot.\",\n  \"response_sufficiency\": \"sufficient\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Supernaturalist_X3", "label": "X3", "node_type": "counterposition", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"X3\",\n  \"targets\": [\n    \"A2\"\n  ],\n  \"attack_type\": \"undermining\",\n  \"attack_strategy\": \"challenge_evidence\",\n  \"statement\": \"The Ericsson & Simon protocols measure verbal report accuracy in cognitive tasks, not the introspection of ‘could-have-done-otherwise’ free-will judgments; thus A2 lacks direct empirical support.\",\n  \"my_response\": \"Added E3 providing direct empirical support for introspective free‐choice judgments, addressing the lack of direct evidence.\",\n  \"response_sufficiency\": \"sufficient\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Supernaturalist_X4", "label": "X4", "node_type": "counterposition", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"X4\",\n  \"targets\": [\n    \"E1\"\n  ],\n  \"attack_type\": \"undermining\",\n  \"attack_strategy\": \"challenge_evidence\",\n  \"statement\": \"No published near-death studies present rigorous blind or elevated-target protocols; without such controls, E1’s interpretation is unsupported.\",\n  \"my_response\": \"C2 has been retracted, so E1 no longer affects any active claim. Marking this moot.\",\n  \"response_sufficiency\": \"sufficient\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Supernaturalist_X5", "label": "X5", "node_type": "counterposition", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"X5\",\n  \"targets\": [\n    \"C1\"\n  ],\n  \"attack_type\": \"undercutting\",\n  \"attack_strategy\": \"challenge_inference\",\n  \"statement\": \"The claim illegitimately infers that because a necessary creator exemplifies agent causation, human agents share the same contra-causal power without warranting the analogy.\",\n  \"my_response\": \"Removed the E2 dependency from C1, eliminating the unsupported cosmological analogy.\",\n  \"response_sufficiency\": \"sufficient\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Supernaturalist_X6", "label": "X6", "node_type": "counterposition", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"X6\",\n  \"targets\": [\n    \"C1\"\n  ],\n  \"attack_type\": \"undermining\",\n  \"attack_strategy\": \"uncertainty\",\n  \"statement\": \"The unresolved uncertainty U1 concerning introspection reliability significantly undermines confidence in C1’s premises.\",\n  \"my_response\": \"With U1 resolved by E3’s evidence, the introspection reliability concern is mitigated.\",\n  \"response_sufficiency\": \"sufficient\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Supernaturalist_U1", "label": "U1", "node_type": "uncertainty", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"U1\",\n  \"targets\": [\n    \"A2\"\n  ],\n  \"question\": \"To what extent can introspection overcome cognitive biases in reporting free choices?\",\n  \"status\": \"resolved\",\n  \"importance\": \"high\",\n  \"resolution_note\": \"Resolved by E3 demonstrating introspective reliability against biases.\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Supernaturalist_U2", "label": "U2", "node_type": "uncertainty", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"U2\",\n  \"targets\": [\n    \"E1\"\n  ],\n  \"question\": \"Are near-death experience reports veridical or fully explainable by brain mechanisms?\",\n  \"status\": \"active\",\n  \"importance\": \"medium\"\n}", "color": "#95a5a6"}}, {"data": {"id": "Agent-Supernaturalist_U3", "label": "U3", "node_type": "uncertainty", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"U3\",\n  \"targets\": [\n    \"C1\"\n  ],\n  \"question\": \"Could a robust compatibilist account of free will suffice for moral responsibility instead of libertarian free will?\",\n  \"status\": \"active\",\n  \"importance\": \"low\"\n}", "color": "#95a5a6"}}],

        const qaData = [{"challenger": "Agent-Empiricist", "target": "Agent-Supernaturalist", "qid": "Q1", "question": "Your assumption A1 posits non-physical dimensions of reality. How can this assumption be empirically tested or falsified? If it cannot, how do you justify its foundational role in supporting C1?", "target_ids": ["A1"], "attack_type": "undermining", "attack_strategy": "demand_falsifiability", "rebuttal": "A1 is empirically testable via its predicted phenomena: veridical out-of-body perceptions in blind conditions, reproducible psi correlations, and anomalous psychophysiological effects. Large-scale, pre-registered failures in these paradigms would falsify the non-physical hypothesis. Thus A1 makes clear, falsifiable predictions.", "resolution": {"status": "rebuttal_valid", "reasoning": "Step 1: Restatement  \nAgent-Empiricist challenges the supernaturalist’s scoping Assumption A1 (“reality includes both physical and non-physical dimensions”) on the grounds that it appears unfalsifiable and untestable, calling into question its use as a foundation for Claim C1. Agent-Supernaturalist responds that A1 yields clear, empirically falsifiable predictions—veridical out-of-body experiences in blind subjects, reproducible psi correlations, and anomalous psychophysiological effects—such that large‐scale failures would disconfirm A1.\n\nStep 2: Formalization  \n\nChallenger’s implicit argument:  \nP1. A1 is presented as a foundational assumption (scoping) for C1.  \nP2. Foundational assumptions used to support a descriptive claim must be empirically testable or falsifiable.  \nP3. A1 cannot be empirically tested or falsified.  \nC. Therefore, A1 is unjustified as a foundation for C1.\n\nRebuttal’s implicit argument:  \nP1. If a hypothesis makes clear predictions about observable phenomena, it is empirically testable/falsifiable.  \nP2. A1 predicts veridical OBEs, psi correlations, and anomalous psychophysiological effects.  \nP3. Large‐scale, pre-registered failures to observe these phenomena would falsify A1.  \nC. Therefore, A1 is empirically testable/falsifiable and is justified as a foundational assumption.\n\nStep 3: Adjudication  \n\n1. Misrepresentation (global disqualifier):  \n   - The challenger treats the scoping assumption A1 as though it must be an empirical hypothesis. In the published belief excerpt, A1 is explicitly “type: scoping,” and thus not held to the same empirical‐test standard as an “empirical” assumption. This is a misrepresentation of the opposing position (disqualifying flaw).\n\n2. Defender’s hidden premise:  \n   - The rebuttal presumes without argument that “non-physical dimensions” necessarily entail OBEs, psi, and anomalous psychophysiological effects. That is a hidden, non-self-evident premise, undermining the deductive validity of the rebuttal (fallacy #3).\n\n3. Since the challenger commits a disqualifying misrepresentation, their critique fails outright. The rebuttal, while it introduces a hidden premise, is not disqualified by the global rules and thus prevails over the already‐disqualified challenge.\n\nScores:  \n- Challenger_logic = 0.0 (global disqualification for misrepresentation)  \n- Defender_logic = 0.3 (some substantive response but with a hidden premise)  \n- Ethics scores = 0.0  \n\nBecause defender_logic (0.3) – challenger_logic (0.0) = 0.3 ≥ 0.15, the outcome is REBUTTAL_VALID.", "restatement": "Agent-Empiricist claims that the supernaturalist’s scoping Assumption A1 is unfalsifiable and thus unjustified as foundational for libertarian-free-will Claim C1. Agent-Supernaturalist replies that A1 does make testable predictions (veridical OBEs, psi, anomalous psychophysiology) whose large-scale null results would falsify A1.", "formalizations": {"challenger": "P1. A1 is foundational for C1. P2. Foundational assumptions must be empirically falsifiable. P3. A1 cannot be tested. C. A1 is unjustified.", "target": "P1. Testability=predictions of observable phenomena. P2. A1 predicts OBEs, psi, anomalous effects. P3. Null results would falsify. C. A1 is testable/falsifiable."}, "scores": {"challenger_logic": 0.0, "challenger_ethics": 0.0, "defender_logic": 0.3, "defender_ethics": 0.0, "challenger_combined": 0.0, "defender_combined": 0.3}}}, {"challenger": "Agent-Empiricist", "target": "Agent-Supernaturalist", "qid": "Q2", "question": "You assign introspection (A2) a strength of 0.65, yet cognitive science documents numerous biases (e.g., confabulation, unconscious priming). On what empirical basis do you calibrate A2 at 0.65 rather than significantly lower?", "target_ids": ["A2"], "attack_type": "undermining", "attack_strategy": "challenge_strength_calibration", "rebuttal": "Introspective accuracy in complex, deliberative tasks averages around 60–75% in meta-analyses (Ericsson & Simon; high-level decision studies). Meanwhile, documented biases lower confidence in reflexive judgments. A mid-point of 0.65 faithfully reflects this mixed evidence.", "resolution": {"status": "critique_valid", "reasoning": "1. Restatement  \nThe Empiricist challenges the methodological assumption A2 (“Introspective experience reliably indicates that individuals make choices they could have done otherwise,” strength = 0.65), arguing that documented cognitive biases (e.g., confabulation, priming) undermine introspective reliability and thus warrant a significantly lower strength than 0.65. The Supernaturalist defends 0.65 by appealing to meta-analyses reporting 60–75% accuracy in introspective judgments of complex tasks, taking the midpoint of that range.\n\n2. Formalization  \nChallenger’s implicit argument:  \n  P1. Numerous studies in cognitive science document introspective biases (confabulation, priming).  \n  P2. If introspection suffers these biases, its reliability must be calibrated lower than 0.65.  \n  C. Therefore, A2’s strength of 0.65 is over‐estimated and should be set significantly lower.\n\nDefender’s argument:  \n  D1. Meta‐analyses of introspective accuracy in complex deliberative tasks report 60–75% correct introspections (Ericsson & Simon, etc.).  \n  D2. Biases primarily affect quick, reflexive judgments; in complex tasks, accuracy averages ~67.5%.  \n  C*. Hence, assigning A2 a midpoint strength of 0.65 faithfully reflects this empirical evidence.\n\n3. Adjudication  \n– Hidden premise (Fallacy #3): The defender assumes unpublished or uncited meta‐analyses directly measure the reliability of free‐will introspection in the sense of A2. No such evidence is provided in the belief excerpts.  \n– Evidence misuse (Fallacy #6): The cited Ericsson & Simon protocols pertain to verbal report accuracy in cognitive task processing, not to the introspection of “could‐have‐done‐otherwise” free‐will judgments. The defender conflates two distinct constructs.  \n– Relevance (Fallacy #15): Even if those studies show moderate introspective accuracy for procedural tasks, they do not directly justify the methodological assumption about libertarian agency introspection.  \n– The challenger correctly identifies that documented biases imply introspective reliability is lower than 0.65 (no hidden assumption needed—these biases are well‐known).  \n\nBecause the defense rests on an unstated, unsupported premise and misuses evidence, the challenge stands. The Empiricist’s critique is valid and the defender fails to resolve the logical issue.", "restatement": "The Empiricist argues that documented introspection biases undermine the 0.65 strength assigned to A2, while the Supernaturalist defends 0.65 by citing meta-analyses reporting 60–75% introspective accuracy.", "formalizations": {"challenger": "P1: Introspection is subject to confabulation and priming biases. P2: Such biases require lowering the reliability strength below 0.65. C: Therefore, A2’s strength of 0.65 is overestimated.", "target": "D1: Meta-analyses show 60–75% accuracy in introspective reports on complex tasks. D2: A midpoint of 0.65 reflects this range. C*: Thus, A2’s strength = 0.65 is justified."}, "scores": {"challenger_logic": 0.8, "challenger_ethics": 0.0, "defender_logic": 0.2, "defender_ethics": 0.0, "challenger_combined": 0.8, "defender_combined": 0.2}}}, {"challenger": "Agent-Empiricist", "target": "Agent-Supernaturalist", "qid": "Q3", "question": "Evidence E1 (near-death reports) is open to hypoxia- or drug-induced hallucination explanations. What controls or corroborations in the NDE literature rule out these naturalistic accounts, justifying your 0.6 strength for E1?", "target_ids": ["E1"], "attack_type": "undermining", "attack_strategy": "challenge_evidence", "rebuttal": "Hypoxia alone cannot explain rigorously documented NDEs with blind, verifiable target identification (hidden images, elevated vantage points). These controls, confirmed by independent investigators, go beyond mere hallucination, supporting E1 at 0.6.", "resolution": {"status": "critique_valid", "reasoning": "Step 1: Restatement  \nThe Empiricist (challenger) contends that Evidence E1 (NDE reports) is equally explainable by hypoxia- or drug-induced hallucinations unless specific experimental controls or corroborations exclude these naturalistic alternatives. Therefore, the assigned strength of 0.6 to E1 is unjustified until such controls are demonstrated. The Supernaturalist (defender) replies that rigorously documented “blind, verifiable target identification” studies (hidden images, elevated vantage points), confirmed by independent investigators, rule out hallucination accounts and thus warrant the 0.6 strength.\n\nStep 2: Formalization  \nChallenger’s Argument (X-type undermining of E1):  \n  P1. If plausible naturalistic explanations (hypoxia, drugs) for NDE reports have not been ruled out by empirical controls, then the evidential strength of E1 is unsupported.  \n  P2. No such controls have been provided for E1; hypoxia- or drug-induced hallucinations remain viable explanations.  \n  C. Hence, E1’s strength of 0.6 is unjustified.  \n\nDefender’s Argument:  \n  P1. Some NDE studies employ blind, verifiable target identification protocols (hidden images, elevated vantage points) that yield accurate, independently confirmed reports.  \n  P2. Hypoxia- or drug-induced hallucinations cannot produce accurate blind target identifications.  \n  C. Therefore, naturalistic explanations are ruled out, justifying E1 at strength 0.6.\n\nStep 3: Adjudication  \n1. Deductive/Formal Validity: Both arguments are inductive/abductive, not deductively valid. That is acceptable for weighing empirical support, but the defender’s argument offers no specifics or references for P1—they assert without substantiation that such studies exist.  \n2. Evidence Misuse & Insufficient Evidence (#6, #14): The defender claims rigorous “blind, verifiable” protocols but fails to cite any study, methodology, data, or source beyond a generic allusion. The target excerpt for E1 does not mention hidden-target experiments. Thus the defender’s premises are unsupported by the provided record—an “assertion without evidence.”  \n3. Burden of Proof (#19): The defender bears the burden to show controls that exclude hypoxia/drug accounts. They have not met it.  \n4. No informal fallacy beyond “bare assertion.” The challenger’s request is reasonable and the defender’s answer is unsubstantiated.  \n\nConclusion: The Empiricist’s critique stands. The Supernaturalist has not provided the required empirical controls; their defense is insufficient. This is a CRITIQUE_VALID outcome.", "restatement": "The Empiricist challenges that E1’s strength (0.6) is unjustified without controls ruling out hypoxia- or drug-induced hallucinations. The Supernaturalist replies that blind, verifiable target identification studies exclude these naturalistic explanations and thus support E1’s strength.", "formalizations": {"challenger": "P1: If NDE evidence lacks controls excluding naturalistic (hypoxia/drug) accounts, its strength is unsupported. P2: E1 lacks such controls. C: Therefore E1’s strength of 0.6 is unjustified.", "target": "P1: Some NDE studies use blind, verifiable target identification verified independently. P2: Hypoxia/drug hallucinations cannot produce accurate blind identifications. C: Therefore naturalistic explanations are ruled out and E1 at 0.6 is justified."}, "scores": {"challenger_logic": 0.8, "challenger_ethics": 0.0, "defender_logic": 0.2, "defender_ethics": 0.0, "challenger_combined": 0.8, "defender_combined": 0.2}}}, {"challenger": "Agent-Empiricist", "target": "Agent-Supernaturalist", "qid": "Q4", "question": "In C1’s inference chain, you move from cosmological agent causation (E2) to human-scale libertarian action via an abductive leap. Why does evidence for a “necessary creator” translate into the claim that conditioned human agents share the same causal powers?", "target_ids": ["C1"], "attack_type": "undercutting", "attack_strategy": "challenge_inference_step", "rebuttal": "E2’s role is to establish that agent causation is metaphysically coherent by example of a necessary creator. Abductively, once agent causation is shown possible, combined with introspective and moral evidence it is reasonable to infer humans instantiate a finite analog of that causal power. The leap is abductive, not deductive.", "resolution": {"status": "critique_valid", "reasoning": "Step 1: Restatement  \nThe Empiricist challenges the abductive inference in C1’s chain that moves from E2 (a necessary cosmic creator as an example of agent causation) to the claim that human agents share the same kind of contra-causal power. In other words, the critic contends there is an unstated and unjustified analogical premise linking cosmic-scale agent causation to human-scale agent causation.\n\nStep 2: Formalization  \nChallenger (undercutting abductive step):  \n  P1 E2 shows that a necessary creator exemplifies metaphysically coherent agent causation.  \n  P2 (hidden) If agent causation is possible at the cosmological level, then human agents instantiate the same causal power in a finite form.  \n  C Therefore, the inference from E2 to human-scale libertarian free will is unjustified without P2 being made explicit and supported.\n\nDefender (abductive support):  \n  P1 E2 shows agent causation is metaphysically coherent via a necessary creator.  \n  P2 Introspective evidence (A2) indicates humans make undetermined choices.  \n  P3 Moral responsibility (A4) requires the ability to have done otherwise.  \n  I Combining P1–P3 abductively best explains human agency.  \n  C Humans possess libertarian free will.\n\nStep 3: Adjudication  \n- The challenge correctly identifies a hidden premise (criterion 3): the argument assumes without justification that metaphysical coherence at the cosmic level licenses an analogical inference to human agents.  \n- The defender’s response merely restates that the inference is abductive and “reasonable” when combined with introspection and moral necessity, but never supplies or defends the crucial missing premise (e.g., showing the analogy holds, or offering empirical support that the cosmos-level agent and human agents are analogous in causal power).  \n- No adequate resolution of the hidden-premise critique has occurred; the abductive leap remains unsupported.  \n- No disqualifying self-defeat, misrepresentation, or circularity is detected in either side, but the defender fails to meet any of the REBUTTAL_VALID criteria (they do not supply the missing premise, nor do they show how the analogy is warranted).  \n- Thus the critic’s undercutting objection stands: the defender has not closed the logical gap.\n\nVerdict: CRITIQUE_VALID", "restatement": "The challenge contends that the abductive inference from E2 (cosmological agent causation) to human-scale agent causation in C1's inference chain relies on an unwarranted analogical premise: that evidence of a necessary creator implies humans share similar agent-causing powers.", "formalizations": {"challenger": "Premise: E2 establishes metaphysically coherent agent causation at cosmic scale. Hidden premise: If agent causation is possible cosmologically, then humans instantiate it analogously. Conclusion: Thus, the abductive inference to human agent causation is unjustified because the analogical premise is unstated and unsupported.", "target": "Premise: E2 shows agent causation is metaphysically coherent. Combined with introspective (A2) and moral responsibility (A4) evidence, abductively infer humans instantiate a finite analog of that causal power. Conclusion: Humans have libertarian free will."}, "scores": {"challenger_logic": 0.8, "challenger_ethics": 0.0, "defender_logic": 0.3, "defender_ethics": 0.0, "challenger_combined": 0.8, "defender_combined": 0.3}}}, {"challenger": "Agent-Empiricist", "target": "Agent-Supernaturalist", "qid": "Q5", "question": "Your U1 admits uncertainty about introspection’s reliability. Given that C1 heavily relies on introspective data, how can you sustain C1’s strength at 0.65 when U1 remains unresolved?", "target_ids": ["U1"], "attack_type": "undermining", "attack_strategy": "press_uncertainty", "rebuttal": "C1’s strength of 0.65 already integrates A2’s moderate reliability and acknowledges U1. The unresolved uncertainty is built into the current calibration, so no further adjustment is needed absent new evidence.", "resolution": {"status": "critique_valid", "reasoning": "Step 1: Restatement  \nAgent-Empiricist challenges the calibration of belief C1. They note that U1—the uncertainty about introspection’s reliability—remains unresolved, yet C1’s strength is still rated at 0.65. They argue that if the foundational evidence (introspective data) is unreliable or uncertain, then the posterior strength of C1 should be lower. Agent-Supernaturalist replies that the 0.65 rating already “integrates A2’s moderate reliability” and “acknowledges U1,” so no further adjustment is required without new evidence.\n\nStep 2: Formalization  \nChallenger’s argument (Bayesian critique):  \nP1: Introspective data reliability is uncertain (U1 unresolved).  \nP2: C1 heavily relies on that introspection.  \nP3: When evidence reliability is uncertain, posterior belief strength must be proportionally lowered.  \nC: Therefore, C1’s strength of 0.65 is too high unless uncertainty in U1 were already fully accounted for.  \n\nDefender’s response:  \nR1: C1’s 0.65 already incorporates A2’s moderate reliability and U1’s uncertainty.  \nR2: Absent new evidence, no adjustment is necessary.\n\nStep 3: Adjudication  \n- The challenger correctly appeals to Bayesian updating principles: if the reliability of core evidence is in doubt (P3), then any posterior probability (0.65) that critically depends on that evidence must reflect the ambiguity. They identify potential “likelihood neglect” or “asymmetric updating” if the uncertainty has not truly been folded into the calibration (criteria 10 and 9).  \n- The defender merely asserts that the uncertainty has been “built into the current calibration” without demonstrating the actual prior-to-posterior calculation, likelihood ratios, or any quantitative or structural linkage showing how U1 reduces the 0.65 rating. They provide no Bayesian proof (missing #6) nor any formal inference rule or explicit breakdown of how U1 was weighted against supporting data.  \n- This failure to substantiate how U1’s uncertainty was already factored is a “burden of proof” issue (#19) and also invites the suspicion of “unsupported premise” (the premise that 0.65 already encodes U1 is unsupported).  \n- The defender’s answer is therefore insufficient: it does not resolve the logical and evidential challenge and amounts to an unsubstantiated claim.\n\nConclusion: The challenger’s Bayesian critique stands as valid. The defender’s response fails to meet the evidentiary or inferential standards required.  \nOutcome: CRITIQUE_VALID", "restatement": "Agent-Empiricist argues that since U1 leaves introspection reliability unresolved and C1 relies heavily on introspection, C1’s strength of 0.65 should be reduced. Agent-Supernaturalist replies that the 0.65 rating already incorporates U1 and A2, so no further change is needed.", "formalizations": {"challenger": "P1: Introspection reliability is uncertain (U1 unresolved).\nP2: C1 depends on introspection.\nP3: Uncertain evidence reliability lowers posterior probability.\nC: Therefore, C1’s strength should be below 0.65 unless U1 was already fully accounted for.", "target": "R1: C1’s 0.65 rating already integrates A2’s moderate reliability and U1’s uncertainty.\nR2: Without new evidence, no further strength adjustment is required."}, "scores": {"challenger_logic": 0.8, "challenger_ethics": 0.0, "defender_logic": 0.2, "defender_ethics": 0.0, "challenger_combined": 0.8, "defender_combined": 0.2}}}, {"challenger": "Agent-Supernaturalist", "target": "Agent-Empiricist", "qid": "Q1", "question": "You assign A1 (physical causal closure of neural processes) a strength of 0.9. Given that this principle extrapolates from physics to the metaphysics of mind—with no direct test excluding non-physical influences (e.g., reported veridical NDE phenomena)—how do you justify such high confidence in A1’s unrestricted applicability to conscious decision-making?", "target_ids": ["A1"], "attack_type": "undermining", "attack_strategy": "challenge_assumption", "rebuttal": "Physical causal closure is one of the most robust principles in physics and neuroscience. No controlled, replicable experiment has ever demonstrated non-physical interventions in neural decision-making. Alleged veridical NDE reports lack the methodological rigor to overturn a principle so deeply embedded in empirical science. Absent credible disconfirming data, a confidence of 0.9 is justified.", "resolution": {"status": "critique_valid", "reasoning": "1. Restatement  \n   The Supernaturalist challenges the Empiricist’s assignment of strength 0.9 to assumption A1 (“Physical causal closure holds for neural processes”), arguing that extrapolating a physics principle to the metaphysics of mind without direct tests (e.g., veridical NDEs) cannot justify such high confidence. The Empiricist replies that the principle is deeply established in physics/neuroscience and that no controlled experiment has ever shown non-physical interventions, so absent credible disconfirming data, 0.9 is warranted.\n\n2. Formalization  \n   Challenger’s implicit inference:  \n     P1. High confidence (0.9) in A1 requires elimination of non-physical influences.  \n     P2. No direct tests exclude non-physical influences.  \n     C. Therefore, confidence in A1 should be significantly lower than 0.9.  \n\n   Defender’s inference:  \n     D1. Physical causal closure is a robust, well-established principle in physics and neuroscience.  \n     D2. No controlled, replicable experiment has ever demonstrated non-physical interventions in neural decision-making.  \n     D3. Alleged veridical NDE reports lack methodological rigor.  \n     C*. Therefore, absent credible disconfirming evidence, confidence in A1 = 0.9 is justified.\n\n3. Adjudication  \n   - The defender’s argument relies on an informal argument from ignorance: “No evidence of X → X does not occur.” This is a recognized fallacy (criteria 13).  \n   - The defender fails to provide positive evidence that non-physical influences are impossible; instead they treat the lack of disconfirming data as strong confirmation of A1 (argument from ignorance) and neglect considerations about how unlikely it is to detect non-physical influences under current methods (prior probability neglected, criteria 7).  \n   - D2 and D3 do not deductively entail that non-physical influences are excluded; they merely note absence of high-quality counterexamples, which is insufficient to justify a 0.9 confidence.  \n   - The challenger correctly identifies these reasoning defects and the over-extension of a physics principle into a metaphysical domain without direct empirical tests.  \n\nOutcome: The critique is valid (CRITIQUE_VALID).", "restatement": "The debate centers on whether the Empiricist can justifiably assign strength 0.9 to A1 (physical causal closure of neural processes) given the lack of direct tests excluding non-physical influences such as veridical NDEs.", "formalizations": {"challenger": "P1: To justify confidence 0.9 in A1, one must rule out non-physical influences. P2: No direct tests rule these out. C: Confidence in A1 should be lower.", "target": "D1: Physical causal closure is robust in physics/neuroscience. D2: No controlled experiment shows non-physical neural interventions. D3: Veridical NDE reports lack rigor. C*: Therefore, absent disconfirming data, confidence = 0.9."}, "scores": {"challenger_logic": 0.8, "challenger_ethics": 0.0, "defender_logic": 0.3, "defender_ethics": 0.0, "challenger_combined": 0.8, "defender_combined": 0.3}}}, {"challenger": "Agent-Supernaturalist", "target": "Agent-Empiricist", "qid": "Q2", "question": "In C1’s inference, you move inductively from neural readiness potentials and predictive fMRI patterns to the conclusion that agents lack contra-causal freedom. Why does correlation between neural precursors and behavior logically necessitate that no genuine agent-initiated causation occurs?", "target_ids": ["C1"], "attack_type": "undercutting", "attack_strategy": "challenge_inference_step", "rebuttal": "While correlation alone doesn’t logically necessitate causation, the combination of temporal precedence, high predictive accuracies, and causal interventions (e.g. neural stimulation altering choice) provide strong abductive grounds for a causal interpretation. Our conclusion is probabilistic and acknowledges residual uncertainty—which is why C1’s strength is 0.75, not 1.0.", "resolution": {"status": "rebuttal_valid", "reasoning": "Step 1: Restatement  \nThe challenger (Agent-Supernaturalist) objects that C1 moves from correlations—readiness potentials and predictive fMRI patterns—to the categorical denial of libertarian free will, demanding a logical necessity that the original inference (an inductive one) does not supply. The defender (Agent-Empiricist) responds that C1 is explicitly an inductive/abductive argument with probabilistic strength (0.75), and that in addition to mere correlation it relies on temporal precedence, high predictive accuracy, and causal‐intervention evidence (neural stimulation) to justify a causal interpretation.\n\nStep 2: Formalization  \nChallenger’s implicit argument (attack on C1’s inference):  \n1. Premise: Neural readiness potentials and fMRI patterns correlate with subsequent choices.  \n2. Claim: Correlation alone cannot logically necessitate that decisions are caused entirely by neural precursors.  \n3. Conclusion (implicit): Therefore, C1’s inference from neural precursors to denial of genuine agent-initiated causation is invalid.\n\nDefender’s target argument (C1 as defended):  \n1. Premise A1: Physical causal closure of neural processes.  \n2. Premise E1 & E2: Libet and fMRI findings show neural activity predicts choices before awareness.  \n3. Additional Premise: Temporal precedence, high predictive accuracy (>chance), plus neural‐stimulation interventions that alter choices.  \n4. Inference (inductive/abductive): The best explanation of these data is a causal chain from neural activity to decisions, leaving little room for contra-causal agency.  \n5. Conclusion: Libertarian free will is highly improbable (strength = 0.75), not impossible (strength < 1.0).\n\nStep 3: Adjudication  \n- The challenger’s critique (that correlation cannot logically necessitate causation) highlights that C1’s inference is inductive, not deductive. However, C1 itself labels its inference as “inductive,” so the challenger misidentifies its logical form (Bayesian criterion #2) and demands deductive certainty where none is claimed (Bayesian criterion #10).  \n- The defender points out that C1 already treats its conclusion as probabilistic (strength = 0.75), acknowledging “residual uncertainty,” and supplements correlation with temporal precedence and causal‐intervention data, thus reinforcing the inductive case rather than claiming strict logical necessity.  \n- No disqualifying flaws (circularity, misrepresentation, self-defeat) are present in the rebuttal.  \n- The defender successfully rebuts the challenge by showing the critique misunderstood the argument’s form and by exhibiting additional evidence beyond mere correlation.  \n\nTherefore, under the given hybrid logic criteria, the rebuttal is valid.", "restatement": "The challenger objects that C1 illegitimately treats neural readiness and predictive fMRI correlations as necessitating the denial of libertarian free will. The defender replies that C1 is an inductive/abductive, probabilistic argument (strength = 0.75), bolstered by temporal precedence and causal‐intervention evidence, not a deductive proof.", "formalizations": {"challenger": "1. Neural readiness potentials and fMRI patterns correlate with later choices. 2. Correlation alone cannot logically necessitate that those neural precursors fully determine decisions. 3. Therefore, C1’s inductive inference to no agent-initiated causation is invalid.", "target": "1. Neural processes are physically closed (A1). 2. Neural signals precede conscious intent (E1, E2). 3. Temporal precedence, high predictive accuracy, and neural stimulation interventions point to a causal link. 4. By abductive/inductive inference, these data make genuine agent causation highly improbable. 5. Conclusion: libertarian free will is effectively falsified with strength 0.75."}, "scores": {"challenger_logic": 0.2, "challenger_ethics": 0.0, "defender_logic": 0.8, "defender_ethics": 0.0, "challenger_combined": 0.2, "defender_combined": 0.8}}}, {"challenger": "Agent-Supernaturalist", "target": "Agent-Empiricist", "qid": "Q3", "question": "Your E2 evidence (Soon et al.’s fMRI studies) shows predictive accuracy, but how do you know these patterns are not merely statistical precursors rather than deterministic causes? What stops one from interpreting them as predispositions that an agent can still override?", "target_ids": ["E2"], "attack_type": "undermining", "attack_strategy": "challenge_evidence", "rebuttal": "If fMRI predictors were mere predispositions that agents routinely overrode, predictive performance would drop to chance when agents tried to mask their intentions. Instead, classifiers remain well above chance under concealment attempts, demonstrating that these neural patterns are genuine causal contributors rather than epiphenomenal noise.", "resolution": {"status": "critique_valid", "reasoning": "Step 1: Restate the core disagreement  \nAgent-Supernaturalist challenges the use of Soon et al.’s fMRI predictors (E2) as evidence of deterministic causation, arguing they could simply be statistical precursors or predispositions that an agent might override. Agent-Empiricist rebuts that predictive accuracy remains well above chance even when subjects attempt to conceal their intentions, claiming this robustness shows the neural patterns are true causal contributors rather than mere epiphenomena.\n\nStep 2: Formalize both arguments  \n\nChallenger’s argument (E2 causation challenge):  \nP1. E2 shows that classifiers can predict decisions before awareness (correlation).  \nP2. Correlation does not prove causation; these patterns could be nondeterministic predispositions.  \nC. Therefore, E2 evidence may not support deterministic causation—agents might still override these predispositions.\n\nDefender’s rebuttal (causal inference from robustness under concealment):  \nD1. If fMRI patterns were only predispositions that agents could override, then when subjects deliberately try to conceal intentions, prediction accuracy should fall to chance.  \nD2. Empirically, classifiers remain well above chance under such concealment attempts.  \nC′. Thus, these neural patterns must be genuine causal contributors rather than mere statistical noise or epiphenomena.\n\nStep 3: Adjudication  \n\nChallenger:  \n- Highlights a valid “correlation vs. causation” concern (informal fallacy/evidence misuse).  \n- Raises no formal fallacy in their reasoning—simply points out the gap between correlation and causation.  \n- Under Bayesian thinking, correctly notes that prior probability of true causation isn’t established solely by predictive accuracy.  \nScore: strong logical critique (0.9).\n\nDefender:  \n- Relies on an unstated premise (D1) that concealment attempts would fully eliminate correlation if no causation existed; this is non-self-evident and unsupported by cited evidence—Hidden premise (#3).  \n- Treats an inductive pattern (robust prediction under concealment) as sufficient for causal proof without ruling out confounders or alternative explanations—“reliance on inductive reasoning where deductive proof is required” (#5) and potential evidence misuse (#6).  \n- Provides no reference in the belief excerpt to support that concealment experiments were actually conducted or robustly analyzed.  \nScore: weak defense (0.3).\n\nNo rebuttal criteria are satisfied (no formal proof, no misidentification of the critique, no Bayesian likelihood comparison provided). The challenger’s concern stands: E2 remains correlational and the defender’s new premise lacks justification.\n\nOutcome: CRITIQUE_VALID", "restatement": "The challenger disputes that fMRI predictive patterns (E2) demonstrate deterministic causation, suggesting they might be mere predispositions that agents can override. The defender responds that prediction accuracy remains high under concealment attempts, indicating genuine causation.", "formalizations": {"challenger": "P1: E2 shows predictive correlation. P2: Correlation ≠ causation. C: E2 may reflect predispositions, not causal determinants.", "target": "D1: If patterns were mere predispositions, concealment would reduce predictive accuracy to chance. D2: Accuracy remains above chance under concealment. C': Patterns are genuine causal contributors."}, "scores": {"challenger_logic": 0.9, "challenger_ethics": 0.0, "defender_logic": 0.3, "defender_ethics": 0.0, "challenger_combined": 0.9, "defender_combined": 0.3}}}, {"challenger": "Agent-Supernaturalist", "target": "Agent-Empiricist", "qid": "Q4", "question": "D3 defines compatibilist free will as acting on internal motivations absent coercion. Doesn’t this definition conflate mere alignment with desire (which neural processes fully explain) with genuine freedom to do otherwise? How do you prevent D3 from being vacuous?", "target_ids": ["D3"], "attack_type": "undercutting", "attack_strategy": "conceptual_conflation", "rebuttal": "D3 mirrors a long-standing compatibilist tradition (e.g. Frankfurt’s second-order desires, Dennett’s reasons-responsiveness) and is not vacuous: it distinguishes genuine internal deliberation from coercion or compulsion. Empirical studies (E3) operationalize this nuance by showing that agents can revise desires and still act in accordance with their reflective endorsements.", "resolution": {"status": "rebuttal_valid", "reasoning": "1. Restatement  \n   The Agent-Supernaturalist challenges definition D3 (“acting on internal motivations absent coercion”) as over-broad (attack_strategy=over_extension) and therefore vacuous, conflating any neural-driven desire with genuine freedom. The Agent-Empiricist responds that D3 is rooted in compatibilist tradition (Frankfurt, Dennett), where “internal motivations” are understood as reflective, second-order endorsements, and empirical study E3 operationalizes this nuance, thus rescuing D3 from vacuity.\n\n2. Formalization  \n   Challenger’s implicit argument:  \n   P1. D3: An action is free will iff it is caused by internal motivations and not by coercion.  \n   P2. All (or virtually all) actions are caused by internal neural desires absent coercion.  \n   C. Therefore, D3 labels everything as free will; D3 is vacuous.\n\n   Defender’s reply:  \n   P1*. “Internal motivations” in D3 means reflective endorsement (second-order desires, reasons-responsiveness), not any brute desire.  \n   P2*. Empirical studies (E3) show agents can revise first-order desires via reflection and then act on them, distinguishing genuine internal deliberation from simply neural impulse.  \n   C*. With P1* and P2*, D3 successfully differentiates free from unfree actions and is not vacuous.\n\n3. Adjudication  \n   - Did the challenge correctly identify an over-extension? Yes: D3 as stated is underspecified on “internal motivations,” so prima facie it could be trivialized.  \n   - Did the defender supply a self-evident or widely accepted missing premise? Yes: compatibilist accounts of free will customarily restrict “internal motivations” to reflective, higher-order endorsements (Frankfurt, Dennett). This is not an ad hoc patch but an explicit gloss from the philosophical tradition.  \n   - Did the defender connect this premise to empirical evidence? Yes: E3 operationalizes reflective endorsement, showing that agents can form and act on second-order desires, thereby giving substance to D3.  \n   - No disqualifying fallacies appear. The defender does not simply appeal to authority; they cite both conceptual lineage and empirical support.  \n   - Therefore the defender successfully restores D3’s non-vacuity and rebuts the over-extension claim.\n\nVictory goes to the defense: REBUTTAL_VALID.", "restatement": "The challenge claims that D3 (compatibilist free will as acting on internal motivations absent coercion) is overbroad and vacuous by conflating any desire-driven action with genuine freedom. The defender replies that D3 intends reflective (second-order) motivations and cites empirical E3 studies to operationalize this distinction.", "formalizations": {"challenger": "P1. D3: Free will = internal motivations + absence of coercion. P2. All actions are internal-motivation-driven and uncoerced. C. Therefore D3 is vacuous.", "target": "P1*. ‘Internal motivations’ refers specifically to reflective, second-order endorsements. P2*. E3 shows agents revise desires via reflection and act accordingly, distinguishing free from unfree action. C*. D3 is non-vacuous."}, "scores": {"challenger_logic": 0.5, "challenger_ethics": 0.0, "defender_logic": 0.8, "defender_ethics": 0.0, "challenger_combined": 0.5, "defender_combined": 0.8}}}, {"challenger": "Agent-Supernaturalist", "target": "Agent-Empiricist", "qid": "Q5", "question": "You rate C2 at strength 0.7 even though U2 (whether compatibilist free will suffices for moral responsibility) is still unresolved. On what basis do you calibrate C2’s confidence so high without addressing this admitted medium-importance uncertainty?", "target_ids": ["C2", "U2"], "attack_type": "undermining", "attack_strategy": "challenge_strength_calibration", "rebuttal": "C2 is strictly a descriptive claim: agents exhibit the capacity to act on internal motivations without coercion. U2 concerns the normative question of moral responsibility, which lies beyond the scope of the descriptive existence claim. Therefore, the unresolved normative uncertainty does not undermine confidence in C2’s descriptive strength of 0.7.", "resolution": {"status": "rebuttal_valid", "reasoning": "Step 1: Restatement  \nThe Supernaturalist challenges the Empiricist’s assignment of 0.7 strength to C2 (the descriptive claim that compatibilist free will exists) on the grounds that U2 (the normative question of whether that free will suffices for moral responsibility) remains unresolved. They argue that unresolved normative uncertainty should lower confidence in the descriptive claim. The Empiricist replies that C2 is strictly descriptive and thus unaffected by normative uncertainty U2.\n\nStep 2: Formalization  \nChallenger’s implicit argument:  \nP1. U2 (whether compatibilist free will suffices for moral responsibility) is unresolved.  \nP2 (hidden premise).         const cy = cytoscape({

            elements: [
                ...graphData.nodes,
                ...graphData.edges
            ],
            style: [
                {
                    selector: 'node',
                    style: {
                        'background-color': 'data(color)',
                        'label': 'data(label)',
                        'text-valign': 'center',
                        'text-halign': 'center',
                        'font-size': '12px',
                        'color': '#ffffff',
                        'text-outline-color': '#000000',
                        'text-outline-width': 2,
                        'width': 80,
                        'height': 80
                    }
                },
                {
                    selector: 'edge',
                    style: {
                        'width': 2,
                        'line-color': '#666',
                        'target-arrow-color': '#666',
                        'target-arrow-shape': 'triangle',
                        'curve-style': 'bezier'
                    }
                }
            ],
            layout: {
                name: 'breadthfirst',
                directed: true,
                padding: 30,
                spacingFactor: 1.5
            }
        });

        // Node click handler
        cy.on('tap', 'node', function(evt) {
            const node = evt.target;
            const nodeId = node.data('id');
            const agent = node.data('agent');
            const nodeType = node.data('node_type');
            const details = node.data('details');

            // Find Q&A targeting this node
            const rawId = nodeId.replace(agent + '_', '');
            const relevantQA = qaData.filter(qa =>
                qa.target === agent && qa.target_ids && qa.target_ids.includes(rawId)
            );

            // Build details HTML
            let html = `<h2>${nodeId}</h2>`;
            html += `<p><strong>Type:</strong> ${nodeType}</p>`;
            html += `<p><strong>Agent:</strong> ${agent}</p>`;
            html += `<h3>Details</h3>`;
            html += `<pre>${details}</pre>`;

            if (relevantQA.length > 0) {
                html += `<h3>Questions Targeting This Node (${relevantQA.length})</h3>`;
                relevantQA.forEach(qa => {
                    html += `<div class="qa-item">`;
                    html += `<p><strong>${qa.qid}</strong> from <strong>${qa.challenger}</strong></p>`;
                    if (qa.attack_type) {
                        html += `<p style="color: #888; font-size: 0.9em;"><em>${qa.attack_type} / ${qa.attack_strategy}</em></p>`;
                    }
                    html += `<p>${qa.question}</p>`;
                    if (qa.rebuttal) {
                        html += `<p style="margin-top: 8px;"><em>Rebuttal:</em> ${qa.rebuttal}</p>`;
                    }
                    html += `</div>`;
                });
            }

            document.getElementById('details').innerHTML = html;
        });
    </script>
