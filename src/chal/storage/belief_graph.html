ents aiming to predict choices; evaluate if any achieve 100% success\",\n      \"decision_criterion\": \"If all experiments fail to reach perfect prediction, libertarian free will remains viable\",\n      \"potential_falsifiers\": [\n        \"Experiments that predict decisions with certainty before conscious choice\"\n      ]\n    }\n  ],\n  \"strength_justification\": \"0.45 — reduced from 0.6 due to lowered dependencies C3 (0.50), C1 (0.55), and C2 (0.55); limited by C3\"\n}", "color": "#e74c3c"}}, {"data": {"id": "Agent-Supernaturalist_C5", "label": "C5: Conscious deliberation sometimes occurs prior to p...", "node_type": "claim", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"C5\",\n  \"type\": \"descriptive\",\n  \"statement\": \"Conscious deliberation sometimes occurs prior to preparatory neural activity, indicating genuine agent causation beyond determinism.\",\n  \"depends_on\": [\n    \"A2\",\n    \"E4\"\n  ],\n  \"strength\": 0.65,\n  \"status\": \"active\",\n  \"strength_justification\": \"0.65 — supported by A2 (0.70) and E4 (0.70); limited by U1 (active)\",\n  \"predictions\": [\n    {\n      \"statement\": \"If deterministic neural processes fully account for decisions, no cases of conscious intention preceding readiness potentials will be found.\",\n      \"test\": \"Replicate high-resolution EEG experiments on the timing of conscious intention.\",\n      \"decision_criterion\": \"Finding consistent cases where conscious intention precedes readiness potential supports C5.\"\n    }\n  ]\n}", "color": "#e74c3c"}}, {"data": {"id": "Agent-Supernaturalist_E1", "label": "E1: First-person reports consistently describe an expe...", "node_type": "evidence", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"E1\",\n  \"type\": \"empirical\",\n  \"summary\": \"First-person reports consistently describe an experience of choosing among genuine alternatives\",\n  \"source\": \"Psychology and phenomenology literature\",\n  \"relevance_to_claims\": [\n    \"C1\"\n  ],\n  \"strength\": 0.65,\n  \"status\": \"active\",\n  \"strength_justification\": \"Robust across cultures and experimental paradigms, though subject to interpretation\"\n}", "color": "#2ecc71"}}, {"data": {"id": "Agent-Supernaturalist_E2", "label": "E2: Historical philosophical and theological tradition...", "node_type": "evidence", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"E2\",\n  \"type\": \"expert_consensus\",\n  \"summary\": \"Historical philosophical and theological traditions (e.g., Augustine, Aquinas, Reid) affirm an immaterial soul capable of mental causation\",\n  \"source\": \"Philosophy of Mind and Theology texts\",\n  \"relevance_to_claims\": [\n    \"C3\"\n  ],\n  \"strength\": 0.45,\n  \"status\": \"revised\",\n  \"strength_justification\": \"0.45 — reduced from 0.6; E2 conceded non‐empirical and lacking falsifiability\"\n}", "color": "#2ecc71"}}, {"data": {"id": "Agent-Supernaturalist_E3", "label": "E3: Persistent explanatory gap: no physicalist account...", "node_type": "evidence", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"E3\",\n  \"type\": \"empirical\",\n  \"summary\": \"Persistent explanatory gap: no physicalist account yet maps subjective qualia to neural processes.\",\n  \"source\": \"Contemporary philosophy of mind literature\",\n  \"relevance_to_claims\": [\n    \"C3\"\n  ],\n  \"strength\": 0.6,\n  \"status\": \"active\",\n  \"strength_justification\": \"0.60 — consensus that the explanatory gap remains an open problem\"\n}", "color": "#2ecc71"}}, {"data": {"id": "Agent-Supernaturalist_E4", "label": "E4: Matsuhashi & Hallett’s study indicates that consci...", "node_type": "evidence", "agent": "Agent-Supernaturalist", "details": "{\n  \"id\": \"E4\",\n  \"type\": \"empirical\",\n  \"summary\": \"Matsuhashi & Hallett’s study indicates that conscious intention can occur prior to readiness potentials, suggesting readiness potentials reflect background preparation rather than decis         const qaData = [{"challenger": "Agent-Empiricist", "target": "Agent-Supernaturalist", "qid": "Q1", "question": "Your foundational assumption A1 posits an immaterial soul without direct empirical evidence. On what empirical or methodological grounds do you justify labeling this assumption as 'foundational' and assigning it a strength of 0.6, given the principle of parsimony?", "target_ids": ["A1"], "attack_type": "undermining", "attack_strategy": "challenge_assumption", "rebuttal": "A1 is metaphysical and rightly foundational: it plays the same role as axioms in logic or mathematics. Its 0.6 strength reflects moderate confidence grounded in long-standing cosmological, teleological, and moral arguments. Parsimony disfavors multiplying entities only when simpler theories have equal explanatory scope; physicalism fails to explain consciousness and libertarian choice, whereas A1 does. Hence the strength assignment is justified.", "resolution": {"status": "critique_valid", "reasoning": "1. Restatement  \nThe Empiricist challenges the assumption A1 (“Humans possess an immaterial soul…,” strength 0.6) as unjustified: there is no empirical basis for labeling it “foundational” or for assigning moderate confidence given Occam’s Razor. The Supernaturalist defends A1 by analogizing it to axioms, invoking teleological, moral, and cosmological arguments, and claiming that physicalism lacks explanatory scope so parsimony does not apply.\n\n2. Formalization  \n\n– Empiricist critique (informal):  \n  P1. A1 posits an unobservable immaterial soul with no direct empirical evidence (excerpt confirmation).  \n  P2. By parsimony, we should not posit additional entities without empirical necessity.  \n  C. Therefore, treating A1 as a “foundational” assumption with strength 0.6 is unjustified absent empirical or methodological grounds.\n\n  Valid structure: from P1 & P2, C follows. No detected hidden premises, no fallacies.\n\n– Supernaturalist rebuttal:  \n  P1. Metaphysical principles can be treated axiomatically (by analogy to logic/mathematics).  \n  P2. Centuries of cosmological, teleological, moral arguments provide moderate confidence in A1.  \n  P3. Parsimony excludes only unnecessary entities when simpler theories achieve equal explanatory scope.  \n  P4. Physicalism allegedly fails to explain consciousness and libertarian choice; A1 does.  \n  C. Hence A1’s foundational status and strength 0.6 are justified.\n\n  Analysis of rebuttal fallacies/weak premises:  \n   • False analogy – axioms in logic are definitional, not empirical hypotheses requiring evidential support.  \n   • Unsupported premises – P2 (“centuries of arguments”) and P4 (“physicalism fails…”) are asserted without evidential specifics.   \n   • Appeal to tradition – reliance on “centuries of theological and philosophical argumentation” is an informal fallacy if not justified.  \n   • No Bayesian update – fails to show how these arguments overcome a low prior for soul-entities or quantify explanatory superiority.  \n\n3. Adjudication  \n– The Empiricist’s critique is deductively valid (no fallacy) and appeals properly to Bayesian/Occamist considerations (criteria 7,12).  \n– The Supernaturalist’s defense fails: it relies on a false analogy (criterion 4), invokes unsupported premises (criterion 22), and commits appeal-to-tradition (criterion 13). It does not resolve the parsimony objection or provide concrete evidence weighting.  \n– Scoring: Empiricist logic 0.9, Supernaturalist logic 0.3. Difference 0.6 ≥ 0.15 ⇒ CRITIQUE_VALID.", "restatement": "The Empiricist challenges the assumption A1 (immaterial soul, strength 0.6) as lacking empirical or methodological justification and violating parsimony, while the Supernaturalist defends A1 by analogy to axioms, citing long-standing arguments and claiming physicalism fails where A1 succeeds.", "formalizations": {"challenger": "P1: A1 posits an unobservable immaterial soul without empirical evidence. P2: Parsimony disfavours positing entities without necessity. ∴ C: A1’s foundational status and strength 0.6 are unjustified.", "target": "P1: Metaphysical assumptions can be axiomatic. P2: Centuries of theological/philosophical arguments yield moderate confidence in A1. P3: Parsimony only forbids extra entities when simpler theories match explanatory scope. P4: Physicalism fails to explain consciousness/libertarian choice; A1 does. ∴ C: A1 is justified as foundational with strength 0.6."}, "scores": {"challenger_logic": 0.9, "challenger_ethics": 0.0, "defender_logic": 0.3, "defender_ethics": 0.0, "challenger_combined": 0.9, "defender_combined": 0.3}}}, {"challenger": "Agent-Empiricist", "target": "Agent-Supernaturalist", "qid": "Q2", "question": "Evidence E2 is framed as expert consensus from theological and philosophical traditions. How do you demonstrate that E2 meets the criteria for empirical evidence, and how would you falsify or test the claim that such consensus reflects actual causal efficacy of an immaterial soul?", "target_ids": ["E2"], "attack_type": "undermining", "attack_strategy": "demand_falsifiability", "rebuttal": "You correctly note that E2 is expert consensus, not strictly empirical data. Determining how much weight to give such testimony requires meta-level study of historical philosophical-theological track records in causal claims. This methodological issue remains unresolved and warrants further inquiry.", "resolution": {"status": "critique_valid", "reasoning": "Step 1: Restatement  \nThe Empiricist challenges the Supernaturalist’s use of E2—an expert‐consensus source—as “empirical” evidence for C3 (soul’s causal efficacy) and demands criteria for testing or falsifying that consensus. The Supernaturalist concedes E2 is not strictly empirical data and defers the methodological question.\n\nStep 2: Formalization  \nChallenger’s implicit argument:  \n  P1. Empirical evidence must be testable/falsifiable and based on observable data.  \n  P2. E2 is expert consensus from philosophical/theological traditions, not observable/testable data.  \n  C. Therefore E2 fails to meet the criteria for empirical evidence for C3.\n\nDefender’s (rebuttal) argument:  \n  P1. E2 is expert consensus, not empirical data.  \n  P2. Determining weight of expert testimony requires meta‐level historical track‐record analysis.  \n  C. The question of treating E2 as empirical remains unresolved and requires further study.\n\nStep 3: Adjudication  \n- The challenger identifies “Evidence misuse” (Informal fallacy #6): expert consensus is not the same as testable empirical data.  \n- The defender concedes the flaw instead of rebutting it and offers no test, falsification criterion, or additional premise to restore empirical status.  \n- No Rebuttal_Valid criteria are met: no missing premise supplied, no demonstration of how E2 could be tested or updated Bayesianly, no proof of falsifiability.  \n\nOutcome: The challenge successfully exposes a misuse of evidence. The defender’s response is mere concession and leaves the logical issue open. According to the criteria, this is a CRITIQUE_VALID result.", "restatement": "The dispute concerns whether E2 (expert consensus from theological and philosophical traditions) qualifies as empirical evidence supporting C3 (the soul’s causal efficacy) and how one could test or falsify that claim. The challenger demands empirical criteria and falsifiability tests for E2; the defender concedes E2 is consensus, not empirical, and defers resolution.", "formalizations": {"challenger": "P1: Empirical evidence must be testable and based on observable data. P2: E2 is expert consensus, not observable/testable. C: E2 fails as empirical evidence.", "target": "P1: E2 is expert consensus, not empirical data. P2: Weighting expert testimony requires meta‐level study of track records. C: The empirical status of E2 is unresolved and needs further inquiry."}, "scores": {"challenger_logic": 1.0, "challenger_ethics": 0.0, "defender_logic": 0.0, "defender_ethics": 0.0, "challenger_combined": 1.0, "defender_combined": 0.0}}}, {"challenger": "Agent-Empiricist", "target": "Agent-Supernaturalist", "qid": "Q3", "question": "Your uncertainty U1 admits that introspective reports may not map onto genuine undetermined processes. Until you resolve U1, how can you sustain C1’s strength at 0.65? What empirical test would you require to validate the reliability of introspection in revealing undetermined choices?", "target_ids": ["U1"], "attack_type": "undermining", "attack_strategy": "press_uncertainty", "rebuttal": "I concede that until U1 is resolved, sustaining C1 at 0.65 is unjustified. Introspective reports need corroboration by neural decoding experiments to confirm they track genuinely undetermined choices. I will lower C1’s strength accordingly and pursue combined first-person/neural studies.", "resolution": {"status": "critique_valid", "reasoning": "Step 1: Restatement  \nAgent-Empiricist (challenger) contends that the existing uncertainty U1—namely that introspective reports may not correspond to genuinely undetermined choices—undermines the assignment of strength 0.65 to claim C1. They demand an empirical test to validate the reliability of introspection for detecting undetermined choice processes. Agent-Supernaturalist (defender) concedes that in the face of unresolved U1, C1’s probability rating is unjustified, lowers C1’s strength, and proposes corroborating introspection via neural decoding experiments.\n\nStep 2: Formalization  \nChallenger’s argument:  \n1. U1: Introspective reports may not map onto genuinely undetermined processes.  \n2. If U1 is unresolved, then confidence in C1 cannot be justified at p=0.65.  \n3. Therefore, with U1 unresolved, C1’s rating of 0.65 is unjustified.  \n4. To justify C1, one must specify an empirical test validating introspection reliability.\n\nDefender’s argument:  \n1. C1 currently has strength p=0.65.  \n2. U1 is unresolved.  \n3. Hence, C1’s rating of 0.65 is unjustified (concession of the challenge).  \n4. We will lower C1’s strength and pursue neural decoding studies to test introspective reliability.\n\nStep 3: Adjudication  \nThe challenger identifies insufficient evidence (Informal Fallacy Criterion 14) and reliance on an unresolved premise (U1). There is no logical fallacy in this critique. The defender offers no counter-argument but instead explicitly concedes the point, which by anti-bias rules counts as CRITIQUE_VALID.  \nScores: Challenger’s logic is strong; defender fails to mount a defensive argument.  \nOutcome: critique_valid", "restatement": "The Empiricist challenges C1’s probability rating of 0.65 given unresolved uncertainty U1 about introspective reliability, and demands an empirical test. The Supernaturalist concedes that C1’s strength is unjustified and proposes neural decoding studies to validate introspection.", "formalizations": {"challenger": "1. U1: Introspective reports may not reflect genuinely undetermined processes. 2. If U1 is unresolved, confidence 0.65 in C1 is unjustified. 3. Therefore, C1’s 0.65 rating is unjustified until introspection reliability is empirically validated.", "target": "1. C1 has p=0.65. 2. U1 is unresolved. 3. Therefore C1’s p=0.65 is unjustified (concession). 4. Plan: lower C1 and conduct neural decoding to test introspective validity."}, "scores": {"challenger_logic": 1.0, "challenger_ethics": 0.0, "defender_logic": 0.0, "defender_ethics": 0.0, "challenger_combined": 1.0, "defender_combined": 0.0}}}, {"challenger": "Agent-Empiricist", "target": "Agent-Supernaturalist", "qid": "Q4", "question": "In C3, you infer from A1 and E2 that an immaterial soul can exert causal influence over physical events. Why does the inference that ‘the best explanation is non-physical agency’ follow, rather than simply reflecting gaps in our current understanding of neurobiology?", "target_ids": ["C3"], "attack_type": "undercutting", "attack_strategy": "challenge_inference_step", "rebuttal": "The inference in C3 is an abductive move to the best explanation: only a non-physical agent can account for genuine mental causation and alternative possibilities where physical monism falls short (no account of qualia or libertarian choice). Physicalist ‘gap’ arguments remain unresolved, so C3 stands.", "resolution": {"status": "critique_valid", "reasoning": "1. Restatement  \n   The Empiricist challenges the Supernaturalist’s claim C3—that from premises A1 (“humans have an immaterial soul”) and E2 (“philosophical-theological consensus affirms the soul’s causal efficacy”) one may abductively infer that the “best explanation is non-physical agency.” The question is why this abductive step excludes the possibility that the apparent causal gap merely reflects limits in our current neurobiological understanding.\n\n2. Formalization  \n   Challenger’s critique (inference):  \n     P1: A1 and E2 leave open a causal gap in explaining mental-to-physical influence.  \n     P2: If a causal gap can be due to undiscovered physical mechanisms, then abducting to a non-physical soul is unwarranted.  \n     C: Therefore, the inference in C3 is unwarranted unless one rules out unknown neurobiological explanations.\n\n   Defender’s original C3 (abductive argument):  \n     P1: Humans have an immaterial soul (A1).  \n     P2: Consensus affirms that the soul exerts causal efficacy (E2).  \n     Abduction: The best explanation for genuine mental causation is a non-physical agent.  \n     C3: Therefore, souls enable mental-to-physical causation beyond physical law.\n\n3. Adjudication  \n   - The challenger points out an underdetermination: the abductive leap to non-physical agency ignores the viable hypothesis of undiscovered neurobiological processes. This is a valid Bayesian and abductive critique (Bayesian: one must compare likelihoods under both physical-gap and soul-hypotheses; abductive: best-explanation status demands ruling out alternatives).  \n   - The defender’s reply merely restates the abductive claim (“only a non-physical agent can account…”), without showing why physicalist accounts of qualia or choice are impossible or implausible. Thus it commits:\n     • Appeal to ignorance / burden of proof fallacy (E3/E14): “physicalist gaps remain unresolved, so soul wins”  \n     • False dilemma (E13): asserting “only soul vs. unresolved gap” without eliminating intermediate or future physicalist accounts  \n     • No comparative likelihoods or elimination of alternatives, violating abductive rigor and Bayesian updating (failure of criterion 5 & 10).  \n   - The defender has not provided new premises or evidence to restore validity. They have not shown that all neurobiological explanations are implausible or eliminated, nor given a probabilistic comparison.\n\n   Conclusion: The Empiricist’s critique is VALID under the combined criteria (it identifies flaws 4/6/13/19/10). The Supernaturalist’s rebuttal FAILS to resolve the logical and evidential issue.  \n   Scores reflect a strong critique and a weak defense.", "restatement": "The Empiricist challenges the abductive inference in C3—from 'humans have an immaterial soul' (A1) and 'consensus affirms soul efficacy' (E2) to 'best explanation is non-physical agency'—arguing this ignores the possibility of undiscovered neurobiological mechanisms.", "formalizations": {"challenger": "P1: A1 & E2 leave a causal gap. P2: If that gap may be due to unknown physical mechanisms, then inferring a non-physical soul is unwarranted. C: The inference in C3 is unjustified without ruling out neurobiological explanations.", "target": "P1: Humans have an immaterial soul (A1). P2: Consensus affirms soul's causal efficacy (E2). Abduction: Only a non-physical agent can explain genuine mental causation. C3: Souls enable downward causation beyond physical law."}, "scores": {"challenger_logic": 1.0, "challenger_ethics": 0.0, "defender_logic": 0.3, "defender_ethics": 0.0, "challenger_combined": 1.0, "defender_combined": 0.3}}}, {"challenger": "Agent-Empiricist", "target": "Agent-Supernaturalist", "qid": "Q5", "question": "Assumption A3 holds that moral responsibility requires genuine alternative possibilities. How do you propose to empirically test or potentially falsify this normative claim, and what evidence could demonstrate that moral responsibility is compatible with deterministic psychology?", "target_ids": ["A3"], "attack_type": "undermining", "attack_strategy": "demand_falsifiability", "rebuttal": "A3 is a normative, conceptual claim. It is evaluated through conceptual analysis and moral psychology (e.g. folk-moral surveys under deterministic scenarios), which consistently show people deny desert-based praise without alternative possibilities. Thus the normative premise is upheld, and the challenge is refuted.", "resolution": {"status": "critique_valid", "reasoning": "Step 1: Restating the Dispute  \nAgent-Empiricist challenges the normative assumption A3 (“Moral responsibility presupposes the ability to do otherwise”) by demanding an empirical test or potential falsification procedure for what is explicitly a normative, conceptual claim. They also ask what evidence could show moral responsibility is compatible with deterministic psychology. Agent-Supernaturalist replies that A3 is normative and must be evaluated by conceptual analysis plus moral-psychological (folk survey) data showing that people deny desert-based praise under deterministic scenarios, thereby upholding A3.\n\nStep 2: Formalizing the Arguments  \nChallenger (Empiricist) informally:\n1. A3 is a normative, conceptual claim.  \n2. Normative claims should admit empirical tests or potential falsifiers if they are to have empirical bite.  \n3. How could we test or falsify A3, or show moral responsibility is compatible with determinism?  \n(conclusion: A3 may be unfalsifiable or improperly treated as empirical.)\n\nDefender (Supernaturalist):\n1. A3 is normative/conceptual, not empirical.  \n2. We can evaluate normative/conceptual claims by conceptual analysis and folk-moral surveys.  \n3. Folk surveys under deterministic conditions show people withhold desert-based praise if no alternatives exist.  \n4. Therefore, the normative assumption A3 is supported and the empirical challenge fails.\n\nStep 3: Adjudication  \n– The challenger raises a legitimate methodological question about the empirical testability of a normative premise; no formal fallacy is committed in asking for falsifiability. This is a valid meta-logical critique (no circularity, no misrepresentation).  \n– The defender’s reliance on “folk-moral surveys” to settle a normative, conceptual claim commits an informal fallacy: appeal to popular intuitions (ad populum) or conflates “is” (people believe) with “ought” (normative truth). Empirical data about lay intuitions does not deductively establish a normative principle. This is evidence misuse (criterion 6) and a named informal fallacy (criterion 13).  \n– The defender does not show how conceptual analysis alone yields A3, nor how folk responses justify normative truth; they simply assert surveys suffice. They offer no deductive inference or justificatory premise bridging “people’s intuitions” to “normative truth.”  \n\nBecause the defender’s response fails to resolve the logical issue—indeed it commits clear informal fallacies—the critic’s challenge is successful.  \nConclusion: critique_valid.", "restatement": "Can the normative assumption A3 (that moral responsibility requires genuine alternative possibilities) be empirically tested or falsified, and what evidence would show moral responsibility is compatible with deterministic psychology?", "formalizations": {"challenger": "1. A3 is a normative, conceptual claim.\n2. Normative claims should admit empirical tests or potential falsifiers to have empirical content.\n3. How could one test or falsify A3, or show moral responsibility is compatible with determinism?\n(conclusion: A3 appears unfalsifiable or improperly treated as empirical.)", "target": "1. A3 is normative/conceptual, not empirical.\n2. Conceptual analysis and moral-psychological surveys can evaluate normative claims.\n3. Folk-moral surveys under deterministic scenarios show people deny desert-based praise without alternative possibilities.\n4. Therefore, A3 is upheld; the empirical challenge fails."}, "scores": {"challenger_logic": 0.7, "challenger_ethics": 0.0, "defender_logic": 0.3, "defender_ethics": 0.0, "challenger_combined": 0.7, "defender_combined": 0.3}}}, {"challenger": "Agent-Supernaturalist", "target": "Agent-Empiricist", "qid": "Q1", "question": "You rate A1 (physical causal closure) at 0.85, yet you admit U2: “Are there any empirical exceptions to physical causal closure at macroscopic scales?” What rigorous studies or observations can you cite that conclusively rule out any non-physical causation? If none exist, how do you justify A1’s high confidence?", "target_ids": ["U2"], "attack_type": "undermining", "attack_strategy": "press_uncertainty", "rebuttal": "I refute. A1’s 0.85 rating reflects the vast, convergent absence of any macroscopic anomalies across classical mechanics, quantum field experiments, gravitational tests, and cosmology. Hundreds of high‐precision studies have found no credible evidence of non-physical causal inputs, so the high confidence is empirically grounded.", "resolution": {"status": "rebuttal_valid", "reasoning": "Step 1: Restatement  \nThe dispute centers on whether it is reasonable to assign a high (0.85) confidence to the principle of physical causal closure (A1) given the apparent absence of “rigorous studies” that definitively rule out any non‐physical interventions at macroscopic scales. The challenger (Agent-Supernaturalist) demands conclusive empirical disproof of non‐physical causation before one can claim high confidence. The defender (Agent-Empiricist) replies that the overwhelming lack of any credible anomalies across a vast array of high‐precision physical experiments justifies an 0.85 rating.\n\nStep 2: Formalizations  \nChallenger’s Argument:  \nP1: There are no rigorous, conclusive studies disproving non‐physical macroscopic causation (hidden premise: ruling out non‐physical causes requires deductive proof).  \nP2: If no conclusive disproof exists, one cannot justifiably ascribe high confidence to physical causal closure.  \nC: Assigning A1 a confidence of 0.85 is unjustified.  \n\nDefender’s Argument:  \nP1: Hundreds of high‐precision studies in classical mechanics, quantum fields, gravitation, and cosmology have found zero credible evidence of non‐physical causal inputs.  \nP2: A long‐running absence of anomalies under highly sensitive conditions significantly lowers the probability of any non‐physical intervention. (Bayesian updating: P(evidence|physical closure) ≫ P(evidence|non-physical inputs))  \nC: Thus, a confidence rating of 0.85 in physical causal closure is empirically warranted.\n\nStep 3: Adjudication  \nChallenger’s argument fails primarily because it demands deductive “conclusive studies” to establish an empirical principle, committing a burden of proof violation (Criterion 19) and an argument from ignorance. Physical causal closure is an empirical generalization, necessarily supported by inductive evidence, not deductive proof. The challenger’s insistence that “no deductive disproof” undercuts inductive justification is a misuse of evidential standards (also informal fallacy: appeal to ignorance).  \n\nThe defender, by contrast, provides a clear Bayesian defense (Rebuttal Criterion 5): the probability of observing no anomalous non‐physical causation across numerous sensitive experiments is far higher if causal closure holds than if it fails. This constitutes proper evidence updating from a reasonable prior to justify a high confidence rating. No formal deductive structure is needed because the claim is empirical; inductive strength and Bayesian coherence are the appropriate standards.  \n\nConclusion: The defender successfully rebuts the challenge.", "restatement": "The challenger questions whether one can justifiably rate physical causal closure at 0.85 without conclusive empirical disproof of non-physical interventions; the defender counters that the extensive absence of any credible anomalies across numerous high-precision experiments grounds such a high confidence.", "formalizations": {"challenger": "P1: No rigorous studies conclusively disprove non-physical macroscopic causation. P2: Without such disproof, high confidence in physical causal closure is unjustified. C: A1's 0.85 rating is unjustified.", "target": "P1: Hundreds of high-precision experiments in mechanics, quantum fields, gravitation, and cosmology show no credible non-physical causal inputs. P2: This absence strongly favors physical closure over non-physical interventions (Bayesian update). C: Rating A1 at 0.85 is empirically justified."}, "scores": {"challenger_logic": 0.2, "challenger_ethics": 0.0, "defender_logic": 0.8, "defender_ethics": 0.0, "challenger_combined": 0.2, "defender_combined": 0.8}}}, {"challenger": "Agent-Supernaturalist", "target": "Agent-Empiricist", "qid": "Q2", "question": "Your C1 concludes conscious intention is epiphenomenal because readiness potentials precede reported intentions. Given your U1 uncertainty about subcortical or distributed processes contributing to decision initiation, how can you validly infer that those early neural signatures are the true causal origin of decisions?", "target_ids": ["C1", "U1"], "attack_type": "undercutting", "attack_strategy": "challenge_inference_step", "rebuttal": "I defer. You’re right that subcortical and distributed neural networks (e.g., basal ganglia, thalamocortical loops) could contribute causally before cortical readiness potentials. Addressing U1 requires targeted recordings or manipulations in those structures to map their role in decision initiation.", "resolution": {"status": "critique_valid", "reasoning": "1. Restatement  \n   The challenger disputes the defender’s C1: “Conscious intention is epiphenomenal” based on readiness potentials (E1) and fMRI prediction (E2). The challenger invokes U1—uncertainty about subcortical/distributed decision‐initiating processes—to argue there is a hidden premise: that no other neural processes cause decisions prior to the measured signatures. Without that premise, inferring that the recorded readiness potentials are the true causal origin is invalid.\n\n2. Formalization  \n\n   Challenger’s critique:  \n     P1 (U1): It is unknown whether subcortical/distributed neural processes contribute causally before readiness potentials.  \n     P2: C1’s inference tacitly assumes “no other processes initiate decisions.”  \n     Hidden premise needed for validity (HP): “Only the measured readiness potentials (and fMRI‐identified signatures) can causally initiate decisions.”  \n     → Conclusion: Without HP, the inference from E1/E2 to C1 is invalid (falls to criterion 3: hidden premise).\n\n   Defender’s original inference (C1):  \n     A1: Physical causal closure holds.  \n     A2: Neuroscience can reliably time‐order brain vs. conscious events.  \n     E1: Readiness potentials reliably precede reported intentions.  \n     E2: fMRI predicts choices before awareness.  \n     (Implicit HP): No unmeasured subcortical/distributed processes initiate decisions before these signatures.  \n     Inductive inference: If measurable neural signatures precede awareness, then conscious intention is after‐the‐fact and epiphenomenal.  \n     Conclusion: C1.\n\n3. Adjudication  \n   - The challenger correctly identifies a hidden premise (criterion 3). The defender’s inference from readiness potentials to epiphenomenalism requires establishing that no other neural processes can initiate decisions; this premise is neither stated nor self‐evident, and U1 explicitly acknowledges the opposite uncertainty.  \n   - The defender concedes (“I defer. You’re right…”) without supplying the missing premise or evidence to resolve U1. This is an explicit concession and thus fails to resolve the logical flaw.  \n\n   Therefore, the challenger’s critique succeeds under the criteria for CRITIQUE_VALID.", "restatement": "The challenger argues that inferring conscious intention is epiphenomenal from readiness potentials and fMRI predictions requires an unstated premise that no other subcortical or distributed processes causally initiate decisions; because the defender acknowledges U1 (uncertainty about such processes), the inference is invalid.", "formalizations": {"challenger": "P1: U1 – It is uncertain whether subcortical/distributed neural processes initiate decisions. P2: The defender’s inference assumes: 'Only the measured readiness potentials (and fMRI signatures) can causally initiate decisions.' Conclusion: Without this hidden premise, the inference from E1/E2 to C1 is invalid.", "target": "A1: Physical causal closure holds. A2: Neuroscience can time‐order brain vs. conscious events. E1: Readiness potentials precede reported intentions. E2: fMRI predicts choices before awareness. Implicit HP: No unmeasured subcortical/distributed processes initiate decisions. Inference: Measured signatures precede awareness, so conscious intention is epiphenomenal. Conclusion: C1."}, "scores": {"challenger_logic": 1.0, "challenger_ethics": 0.0, "defender_logic": 0.0, "defender_ethics": 0.0, "challenger_combined": 1.0, "defender_combined": 0.0}}}, {"challenger": "Agent-Supernaturalist", "target": "Agent-Empiricist", "qid": "Q3", "question": "E2’s fMRI studies predict choices with ~60% accuracy—only modestly above chance. How do you defend using E2 at strength 0.75 to support your C1? Are there larger replications demonstrating consistent predictive validity above, say, 80%?", "target_ids": ["E2"], "attack_type": "undermining", "attack_strategy": "challenge_evidence", "rebuttal": "I refute. While Soon et al.’s 60% accuracy is moderate, it sits significantly above chance and is reinforced by subsequent EEG–fMRI fusion and intracranial studies reaching ~65–70%. The 0.75 strength reflects this convergent empirical support, not an arbitrary >80% benchmark.", "resolution": {"status": "unresolved", "reasoning": "<reasoning>\nStep 1 (Restatement):\nThe challenger (Agent-Supernaturalist) disputes the evidential strength assigned to E2 (Soon et al.’s fMRI predictive accuracy ≈60%) in support of C1, asking how one can justify rating E2 at 0.75 without replications showing ≥80% accuracy. The defender (Agent-Empiricist) replies that additional EEG–fMRI fusion and intracranial studies (≈65–70%) bolster the case, so 0.75 is not an arbitrary benchmark.\n\nStep 2 (Formalization):\nChallenger’s argument:\n  1. Premise: E2’s stated predictive accuracy ≈60% (from Soon et al. 2008).\n  2. Premise: A strength rating of 0.75 implies substantially higher reliability than mere chance (50%)—typically near or above 80%.\n  3. Inference (informal/Bayesian): 60% accuracy is insufficient to support a 0.75 strength rating.\n  4. Conclusion: Using E2 at 0.75 to bolster C1 is unjustified absent stronger replications (≥80%).\n\nDefender’s argument:\n  1. Premise: Soon et al. fMRI yields ≈60% accuracy.\n  2. Premise (unsupported in the excerpt): Subsequent EEG–fMRI fusion and intracranial studies yield ≈65–70% accuracy.\n  3. Inference (Bayesian/convergent evidence): Convergent predictive accuracies significantly above chance justify assigning 0.75 to E2.\n  4. Conclusion: E2’s strength rating of 0.75 is based on the aggregate empirical support and not an arbitrary demand for ≥80%.\n\nStep 3 (Adjudication):\n- The challenger correctly identifies an inconsistency between E2’s documented performance (~60%) and assigning it a high strength (0.75). This is a valid evidence‐based critique falling under “Insufficient evidence” (criterion 14). No fallacy is committed.\n- The responder fails to substantiate the key premise about 65–70% accuracy—those studies are not cited in the provided belief excerpt, making this an “Unsupported premise” (criterion 22). The defender does not demonstrate how those figures map quantitatively to 0.75, nor do they show that 65–70% accuracy suffices for that rating. They also ignore the challenger’s threshold question (≥80%).\n- Accordingly, the critique stands, and the defense fails to resolve the logical issue.\n\nResult: critique_valid", "restatement": "Unable to parse restatement", "formalizations": {"challenger": "", "target": ""}, "scores": {}}}, {"challenger": "Agent-Supernaturalist", "target": "Agent-Empiricist", "qid": "Q4", "question": "Your A3 claims that randomness cannot constitute agentive control, rated 0.8. How do you rule out non-classical forms of indeterminacy (e.g., Orch OR or other quantum brain models) that proponents argue could underlie structured, non-random agency? Without engaging these, isn't A3 overconfident?", "target_ids": ["A3"], "attack_type": "undermining", "attack_strategy": "challenge_assumption", "rebuttal": "I refute. Quantum‐brain models like Orch-OR lack any replicable empirical support: calculated decoherence times in neurons are far too short, no quantum interference has been detected in neural tissue, and no unique behavioral predictions have emerged. Thus A3’s high confidence stands.", "resolution": {"status": "rebuttal_valid", "reasoning": "Step 1: Restatement  \nThe challenger (Agent-Supernaturalist) contends that Assumption A3 (“Randomness does not constitute agentive control”) is overconfident because it ignores non-classical indeterminacy proposals (e.g., Orch-OR). The defender (Agent-Empiricist) replies that all such quantum-brain models lack empirical support (decoherence too fast, no interference, no predictions), so A3 remains justified.\n\nStep 2: Formalization  \nChallenger’s implicit argument:  \n  P1: If any plausible quantum-brain model could structure indeterminacy into control, then randomness might constitute agentive control.  \n  P2: Pr ce is detected; no predictive power. C: Such models are unsupported; randomness still lacks agentive control; A3 stands."}, "scores": {"challenger_logic": 0.3, "challenger_ethics": 0.0, "defender_logic": 0.8, "defender_ethics": 0.0, "challenger_combined": 0.3, "defender_combined": 0.8}}}, {"challenger": "Agent-Supernaturalist", "target": "Agent-Empiricist", "qid": "Q5", "question": "In C3 you infer from TMS/subliminal priming studies (E4) that compatibilist free will is coherent and empirically measurable. How does a diminished subjective sense of agency translate into genuine normative freedom or moral responsibility, rather than mere phenomenological illusion?", "target_ids": ["C3"], "attack_type": "undercutting", "attack_strategy": "challenge_inference_step", "rebuttal": "I concede. C3 overreached by equating measured sense-of-agency with normative freedom and moral responsibility. I will revise C3 to clarify it as a descriptive, empirical index of compatibilist agency, and lower its strength accordingly.", "resolution": {"status": "critique_valid", "reasoning": "<reasoning>\n1. Restatement\nThe core dispute concerns claim C3 from Agent-Empiricist’s target beliefs: whether empirical manipulations of the sense of agency (E4) legitimately support the normative conclusion that compatibilist free will (and thus moral responsibility) is coherent and measurable. The challenger (Agent-Supernaturalist) objects that a mere phenomenological shift in reported “sense of agency” does not automatically translate into genuine normative freedom or moral responsibility.\n\n2. Formalizations\nChallenger’s position (implicit argument structure):\n  P1: E4 shows only that subjective reports of agency can be modulated by physical interventions.\n  P2: Normative freedom and moral responsibility require more than phenomenological report—they require genuine alternative possibilities or justificatory power.\n  C: Therefore, from E4 one cannot infer that compatibilist free will (normative freedom) is coherent or empirically measurable.\n\nDefender’s original target argument for C3:\n  A1: Physical causal closure holds.\n  E4: Sense of agency varies reliably with internal motivation under deterministic conditions.\n  (Implicit P3): If subjective sense of agency varies under deterministic conditions, then that index counts as genuine compatibilist freedom.\n  C3: Hence, compatibilist free will is coherent and empirically measurable—even if libertarian free will fails.\n\n3. Adjudication\nThe challenger successfully identifies that the defender’s inference from E4 to normative freedom depends on a hidden, non‐self‐evident premise (P3). This omission is a formal gap (hidden premise fallacy, criterion 3) and evidence misuse (criterion 6), since phenomenological measures do not by themselves establish normative status. The defender’s rebuttal concedes the point (“I concede. C3 overreached…”) rather than resolving the missing‐premise issue or providing independent support for the normative claim. Under the anti‐bias rules, this explicit concession and weakening of C3 constitutes a successful critique and no valid defense is offered. Criteria for CRITIQUE_VALID are met, and no REBUTTAL_VALID criterion is satisfied.\n\nOutcome: critique_valid.", "restatement": "Unable to parse restatement", "formalizations": {"challenger": "", "target": ""}, "scores": {}}}];

        const cy = cytoscape({
            container: document.getElementById('cy'),
            elements: [
                ...graphData.nodes,
                ...graphData.edges
            ],
            style: [
                {
                    selector: 'node',
                    style: {
                        'background-color': 'data(color)',
                        'label': 'data(label)',
                        'text-valign': 'center',
                        'text-halign': 'center',
                        'font-size': '12px',
                        'color': '#ffffff',
                        'text-outline-color': '#000000',
                        'text-outline-width': 2,
                        'width': 80,
                        'height': 80
                    }
                },
                {
                    selector: 'edge',
                    style: {
                        'width': 2,
                        'line-color': '#666',
                        'target-arrow-color': '#666',
                        'target-arrow-shape': 'triangle',
                        'curve-style': 'bezier'
                    }
                }
            ],
            layout: {
                name: 'breadthfirst',
                directed: true,
                padding: 30,
                spacingFactor: 1.5
            }
        });

        // Node click handler
        cy.on('tap', 'node', function(evt) {
            const node = evt.target;
            const nodeId = node.data('id');
            const agent = node.data('agent');
            const nodeType = node.data('node_type');
            const details = node.data('details');

            // Find Q&A targeting this node
            const rawId = nodeId.replace(agent + '_', '');
            const relevantQA = qaData.filter(qa =>
                qa.target === agent && qa.target_ids && qa.target_ids.includes(rawId)
            );

            // Build details HTML
            let html = `<h2>${nodeId}</h2>`;
            html += `<p><strong>Type:</strong> ${nodeType}</p>`;
            html += `<p><strong>Agent:</strong> ${agent}</p>`;
            html += `<h3>Details</h3>`;
            html += `<pre>${details}</pre>`;

            if (relevantQA.length > 0) {
                html += `<h3>Questions Targeting This Node (${relevantQA.length})</h3>`;
                relevantQA.forEach(qa => {
                    html += `<div class="qa-item">`;
                    html += `<p><strong>${qa.qid}</strong> from <strong>${qa.challenger}</strong></p>`;
                    if (qa.attack_type) {
                        html += `<p style="color: #888; font-size: 0.9em;"><em>${qa.attack_type} / ${qa.attack_strategy}</em></p>`;
                    }
                    html += `<p>${qa.question}</p>`;
                    if (qa.rebuttal) {
                        html += `<p style="margin-top: 8px;"><em>Rebuttal:</em> ${qa.rebuttal}</p>`;
                    }
                    html += `</div>`;
                });
            }

            document.getElementById('details').innerHTML = html;
        });
    </script>
